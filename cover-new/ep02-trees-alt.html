<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box;}</style></head><body>
<svg viewBox="0 0 1400 1400" width="1400" height="1400" xmlns="http://www.w3.org/2000/svg">
<defs>
<radialGradient id="bg" cx="50%" cy="30%" r="80%"><stop offset="0%" stop-color="#0a1210"/><stop offset="40%" stop-color="#060e0a"/><stop offset="100%" stop-color="#020806"/></radialGradient>
<linearGradient id="trunk" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c4a043" stop-opacity="0.5"/><stop offset="100%" stop-color="#c4a043" stop-opacity="0.15"/></linearGradient>
<filter id="hb" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="45"/></filter>
<filter id="mb" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="12"/></filter>
<filter id="gl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="sg" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1400" height="1400" fill="url(#bg)"/>

<!-- Sparse stars -->
<g fill="#fff" opacity="0.25">
<circle cx="100" cy="80" r="0.8"/><circle cx="300" cy="50" r="0.6"/><circle cx="520" cy="100" r="1"/><circle cx="750" cy="60" r="0.7"/><circle cx="980" cy="90" r="0.9"/><circle cx="1200" cy="70" r="0.7"/><circle cx="1320" cy="120" r="0.6"/><circle cx="180" cy="200" r="0.7"/><circle cx="450" cy="180" r="0.5"/><circle cx="700" cy="220" r="0.8"/><circle cx="950" cy="190" r="0.6"/><circle cx="1150" cy="210" r="0.9"/>
</g>

<!-- Root glow at base -->
<ellipse cx="700" cy="1150" rx="400" ry="120" fill="#1a3020" opacity="0.4" filter="url(#hb)"/>

<!-- TREE — single massive silhouette, spreading canopy -->
<!-- Trunk -->
<path d="M 690,1100 Q 685,900 680,750 Q 675,600 670,500 Q 668,420 665,350" stroke="#c4a043" stroke-width="4" fill="none" opacity="0.5" stroke-linecap="round"/>
<path d="M 710,1100 Q 715,900 720,750 Q 725,600 730,500 Q 732,420 735,350" stroke="#c4a043" stroke-width="4" fill="none" opacity="0.5" stroke-linecap="round"/>
<!-- Trunk glow -->
<path d="M 700,1100 Q 700,900 700,750 Q 700,600 700,500 Q 700,420 700,350" stroke="#c4a043" stroke-width="18" fill="none" opacity="0.08" filter="url(#mb)"/>

<!-- Major branches -->
<g stroke="#c4a043" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round">
<path d="M 670,500 Q 600,440 520,380 Q 440,330 350,300"/>
<path d="M 730,500 Q 800,440 880,380 Q 960,330 1050,300"/>
<path d="M 675,420 Q 620,370 540,310 Q 470,270 380,240"/>
<path d="M 725,420 Q 780,370 860,310 Q 930,270 1020,240"/>
<path d="M 668,360 Q 610,310 520,260 Q 430,220 330,200"/>
<path d="M 732,360 Q 790,310 880,260 Q 970,220 1070,200"/>
</g>

<!-- Secondary branches -->
<g stroke="#c4a043" stroke-width="1" fill="none" opacity="0.25" stroke-linecap="round">
<path d="M 520,380 Q 480,350 430,330"/><path d="M 520,380 Q 540,360 560,340"/>
<path d="M 880,380 Q 920,350 970,330"/><path d="M 880,380 Q 860,360 840,340"/>
<path d="M 540,310 Q 500,280 450,260"/><path d="M 540,310 Q 560,290 580,270"/>
<path d="M 860,310 Q 900,280 950,260"/><path d="M 860,310 Q 840,290 820,270"/>
<path d="M 520,260 Q 480,240 430,220"/><path d="M 880,260 Q 920,240 970,220"/>
</g>

<!-- Twig details -->
<g stroke="#c4a043" stroke-width="0.5" fill="none" opacity="0.15" stroke-linecap="round">
<path d="M 350,300 Q 320,290 290,285"/><path d="M 350,300 Q 340,310 325,315"/>
<path d="M 1050,300 Q 1080,290 1110,285"/><path d="M 1050,300 Q 1060,310 1075,315"/>
<path d="M 380,240 Q 350,230 320,228"/><path d="M 1020,240 Q 1050,230 1080,228"/>
<path d="M 330,200 Q 300,195 270,194"/><path d="M 1070,200 Q 1100,195 1130,194"/>
</g>

<!-- ROOT SYSTEM — mirrored below ground -->
<g stroke="#c4a043" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round">
<path d="M 690,1100 Q 650,1150 580,1200 Q 500,1260 420,1300"/>
<path d="M 710,1100 Q 750,1150 820,1200 Q 900,1260 980,1300"/>
<path d="M 695,1100 Q 660,1160 600,1220 Q 540,1270 470,1310"/>
<path d="M 705,1100 Q 740,1160 800,1220 Q 860,1270 930,1310"/>
<path d="M 700,1100 Q 690,1170 670,1240 Q 650,1290 630,1330"/>
<path d="M 700,1100 Q 710,1170 730,1240 Q 750,1290 770,1330"/>
</g>
<!-- Root glow -->
<path d="M 700,1100 Q 650,1160 580,1200 Q 500,1260 420,1300" stroke="#c4a043" stroke-width="10" fill="none" opacity="0.04" filter="url(#mb)"/>
<path d="M 700,1100 Q 750,1160 820,1200 Q 900,1260 980,1300" stroke="#c4a043" stroke-width="10" fill="none" opacity="0.04" filter="url(#mb)"/>

<!-- Fine roots -->
<g stroke="#c4a043" stroke-width="0.5" fill="none" opacity="0.12" stroke-linecap="round">
<path d="M 580,1200 Q 540,1220 500,1230"/><path d="M 820,1200 Q 860,1220 900,1230"/>
<path d="M 600,1220 Q 560,1250 520,1260"/><path d="M 800,1220 Q 840,1250 880,1260"/>
<path d="M 670,1240 Q 640,1270 610,1290"/><path d="M 730,1240 Q 760,1270 790,1290"/>
</g>

<!-- Leaf particles drifting -->
<g fill="#e8d080" opacity="0.5" filter="url(#sg)">
<circle cx="420" cy="280" r="2.5"/><circle cx="980" cy="280" r="2.5"/>
<circle cx="350" cy="300" r="2"/><circle cx="1050" cy="300" r="2"/>
<circle cx="300" cy="220" r="2.2"/><circle cx="1100" cy="220" r="2.2"/>
<circle cx="550" cy="320" r="1.8"/><circle cx="850" cy="320" r="1.8"/>
</g>

<!-- Floating leaves animation -->
<g fill="#c4a043">
<circle cx="400" cy="400" r="1.5" opacity="0.4"><animate attributeName="cy" values="400;550;400" dur="8s" repeatCount="indefinite"/><animate attributeName="cx" values="400;420;400" dur="8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;0.1;0.4" dur="8s" repeatCount="indefinite"/></circle>
<circle cx="600" cy="350" r="1.2" opacity="0.3"><animate attributeName="cy" values="350;520;350" dur="10s" repeatCount="indefinite"/><animate attributeName="cx" values="600;580;600" dur="10s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.05;0.3" dur="10s" repeatCount="indefinite"/></circle>
<circle cx="800" cy="380" r="1.8" opacity="0.35"><animate attributeName="cy" values="380;560;380" dur="7s" repeatCount="indefinite"/><animate attributeName="cx" values="800;820;800" dur="7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.35;0.05;0.35" dur="7s" repeatCount="indefinite"/></circle>
<circle cx="1000" cy="350" r="1.3" opacity="0.3"><animate attributeName="cy" values="350;530;350" dur="9s" repeatCount="indefinite"/><animate attributeName="cx" values="1000;980;1000" dur="9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.05;0.3" dur="9s" repeatCount="indefinite"/></circle>
</g>

<!-- Ground line -->
<path d="M 200,1100 Q 400,1090 600,1100 Q 800,1110 1000,1100 Q 1200,1090 1400,1100" stroke="#c4a043" stroke-width="0.8" fill="none" opacity="0.25"/>
<rect x="0" y="1100" width="1400" height="300" fill="#020806" opacity="0.5"/>

<!-- Bottom accent -->
<path d="M 0,1250 Q 200,1245 400,1250 Q 600,1255 800,1248 Q 1000,1242 1200,1250 Q 1350,1255 1400,1250" stroke="#c4a043" stroke-width="0.4" fill="none" opacity="0.1"/>
</svg></body></html>
