<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box;}</style></head><body>
<svg viewBox="0 0 1400 1400" width="1400" height="1400" xmlns="http://www.w3.org/2000/svg">
<defs>
<radialGradient id="space" cx="50%" cy="60%" r="70%"><stop offset="0%" stop-color="#0e0815"/><stop offset="40%" stop-color="#080510"/><stop offset="100%" stop-color="#030208"/></radialGradient>
<radialGradient id="neb1" cx="50%" cy="30%" r="50%"><stop offset="0%" stop-color="#c46040" stop-opacity="0.6"/><stop offset="30%" stop-color="#a04030" stop-opacity="0.35"/><stop offset="60%" stop-color="#803050" stop-opacity="0.15"/><stop offset="100%" stop-color="#803050" stop-opacity="0"/></radialGradient>
<radialGradient id="proto" cx="50%" cy="30%" r="50%"><stop offset="0%" stop-color="#fff8e0" stop-opacity="1"/><stop offset="15%" stop-color="#ffe8b0" stop-opacity="0.95"/><stop offset="35%" stop-color="#ffb848" stop-opacity="0.7"/><stop offset="60%" stop-color="#e08830" stop-opacity="0.4"/><stop offset="100%" stop-color="#803020" stop-opacity="0"/></radialGradient>
<filter id="hb" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="50"/></filter>
<filter id="mb" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="15"/></filter>
<filter id="gl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="sg" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1400" height="1400" fill="url(#space)"/>
<!-- Nebula — upper half only -->
<ellipse cx="700" cy="350" rx="650" ry="380" fill="url(#neb1)"/><ellipse cx="500" cy="250" rx="400" ry="220" fill="#a05060" opacity="0.1" filter="url(#hb)"/>
<ellipse cx="900" cy="280" rx="350" ry="180" fill="#d4a060" opacity="0.08" filter="url(#hb)"/>
<!-- Dense stars upper -->
<g fill="#fff" opacity="0.6"><circle cx="50" cy="30" r="0.8"/><circle cx="140" cy="80" r="1"/><circle cx="240" cy="45" r="0.7"/><circle cx="360" cy="25" r="1.2"/><circle cx="500" cy="60" r="0.9"/><circle cx="660" cy="35" r="1"/><circle cx="800" cy="70" r="0.8"/><circle cx="940" cy="40" r="1.3"/><circle cx="1080" cy="75" r="0.9"/><circle cx="1200" cy="50" r="1.1"/><circle cx="1320" cy="85" r="0.8"/><circle cx="100" cy="160" r="0.9"/><circle cx="220" cy="190" r="1.1"/><circle cx="380" cy="150" r="0.7"/><circle cx="520" cy="210" r="1"/><circle cx="680" cy="175" r="0.8"/><circle cx="860" cy="200" r="1.1"/><circle cx="1000" cy="165" r="0.9"/><circle cx="1160" cy="220" r="1.2"/><circle cx="1300" cy="185" r="0.8"/><circle cx="80" cy="300" r="1"/><circle cx="280" cy="280" r="0.8"/><circle cx="460" cy="330" r="1.1"/><circle cx="640" cy="295" r="0.9"/><circle cx="820" cy="340" r="1"/><circle cx="1020" cy="310" r="0.7"/><circle cx="1200" cy="350" r="1.2"/><circle cx="1350" cy="290" r="0.8"/><circle cx="160" cy="400" r="0.9"/><circle cx="380" cy="420" r="0.7"/><circle cx="580" cy="390" r="1"/><circle cx="780" cy="430" r="0.8"/><circle cx="1000" cy="405" r="1.1"/><circle cx="1180" cy="450" r="0.9"/><circle cx="1320" cy="420" r="1.2"/>
</g>
<g fill="#ffe8b0" opacity="0.45"><circle cx="200" cy="55" r="1.8"/><circle cx="450" cy="45" r="1.5"/><circle cx="750" cy="60" r="2"/><circle cx="1050" cy="50" r="1.7"/><circle cx="1250" cy="70" r="1.9"/><circle cx="320" cy="170" r="1.4"/><circle cx="620" cy="180" r="1.7"/><circle cx="920" cy="170" r="1.3"/><circle cx="1150" cy="190" r="1.5"/><circle cx="220" cy="290" r="1.6"/><circle cx="540" cy="300" r="1.4"/><circle cx="860" cy="310" r="1.8"/><circle cx="1120" cy="320" r="1.5"/>
</g>
<g fill="#ff9988" opacity="0.4"><circle cx="300" cy="100" r="2.5"/><circle cx="900" cy="120" r="2"/><circle cx="1100" cy="250" r="1.8"/><circle cx="500" cy="350" r="2.2"/></g>
<g fill="#88aaff" opacity="0.35"><circle cx="600" cy="80" r="2.2"/><circle cx="1300" cy="140" r="2.5"/><circle cx="150" cy="250" r="1.8"/><circle cx="800" cy="370" r="2"/></g>
<!-- Dust lanes in nebula -->
<ellipse cx="700" cy="320" rx="450" ry="35" fill="#030208" opacity="0.4" transform="rotate(-5,700,320)" filter="url(#mb)"/><ellipse cx="550" cy="280" rx="300" ry="22" fill="#030208" opacity="0.3" transform="rotate(8,550,280)" filter="url(#mb)"/>
<!-- PROTOSTAR — upper center, very big -->
<circle cx="700" cy="300" r="200" fill="url(#proto)"/><circle cx="700" cy="300" r="110" fill="#ffe8b0" opacity="0.35" filter="url(#hb)"/>
<circle cx="700" cy="300" r="45" fill="#fff8e0" opacity="0.95" filter="url(#gl)"/><circle cx="700" cy="300" r="18" fill="#fff" opacity="1"/>
<!-- Accretion disk — horizontal ellipse, dramatic -->
<g stroke="#c4a043" fill="none" opacity="0.35" filter="url(#sg)"><ellipse cx="700" cy="300" rx="300" ry="85" transform="rotate(-10,700,300)" stroke-width="2"/><ellipse cx="700" cy="300" rx="340" ry="100" transform="rotate(-10,700,300)" stroke-width="1" opacity="0.25"/><ellipse cx="700" cy="300" rx="240" ry="65" transform="rotate(-10,700,300)" stroke-width="1.5" opacity="0.3"/>
</g>
<!-- Bipolar jets going WAY up -->
<g stroke="#4a8faa" fill="none" opacity="0.22" filter="url(#gl)"><path d="M 700,300 Q 695,180 690,60 Q 688,-20 685,-100" stroke-width="2.5"/><path d="M 700,300 Q 705,420 710,540" stroke-width="2.5"/><path d="M 695,180 Q 680,100 670,20" stroke-width="1" opacity="0.12"/><path d="M 705,420 Q 720,500 730,580" stroke-width="1" opacity="0.12"/>
</g>
<g filter="url(#sg)"><circle cx="690" cy="60" r="3.5" fill="#6ab0d0" opacity="0.5"/><circle cx="688" cy="-20" r="2.5" fill="#6ab0d0" opacity="0.4"/><circle cx="710" cy="540" r="3.5" fill="#6ab0d0" opacity="0.5"/>
</g>
<!-- HORIZON LINE — dark, dramatic -->
<path d="M 0,650 L 1400,650" stroke="#030208" stroke-width="4" fill="none" opacity="0.8"/>
<!-- Dark silhouette landscape below — flat, stark -->
<rect x="0" y="650" width="1400" height="750" fill="#040208" opacity="0.95"/>
<!-- Observatory / radio telescope silhouettes — left foreground -->
<g fill="#080510">
<!-- Large dish -->
<ellipse cx="200" cy="680" rx="120" ry="30"/><path d="M 200,680 L 200,780" stroke="#080510" stroke-width="8"/><path d="M 160,780 L 240,780" stroke="#080510" stroke-width="6"/>
<!-- Smaller dish -->
<ellipse cx="400" cy="670" rx="70" ry="18"/><path d="M 400,670 L 400,730" stroke="#080510" stroke-width="5"/><path d="M 375,730 L 425,730" stroke="#080510" stroke-width="4"/>
</g>
<!-- Hills / distant mountains silhouette -->
<path d="M 600,650 Q 700,620 800,640 Q 900,610 1000,645 Q 1100,625 1200,650 L 1400,650" fill="#080510"/>
<!-- Ground texture — sparse stars reflected or just texture -->
<g fill="#c4a043" opacity="0.05"><circle cx="300" cy="750" r="0.8"/><circle cx="450" cy="820" r="0.6"/><circle cx="600" cy="780" r="0.9"/><circle cx="750" cy="850" r="0.7"/><circle cx="900" cy="800" r="1"/><circle cx="1050" cy="880" r="0.8"/><circle cx="1200" cy="760" r="0.6"/><circle cx="1350" cy="840" r="0.9"/>
</g>
<!-- Telescope beam — thin gold line pointing at protostar -->
<g stroke="#c4a043" stroke-width="0.4" fill="none" opacity="0.2">
<path d="M 200,670 L 700,300"/><path d="M 400,660 L 700,300"/>
</g>
</svg></body></html>
