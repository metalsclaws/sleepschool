<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box;}</style></head><body>
<svg viewBox="0 0 1400 1400" width="1400" height="1400" xmlns="http://www.w3.org/2000/svg">
<defs>
<radialGradient id="bg" cx="50%" cy="50%" r="65%"><stop offset="0%" stop-color="#12100a"/><stop offset="40%" stop-color="#0a0908"/><stop offset="100%" stop-color="#030302"/></radialGradient>
<radialGradient id="coreG" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#e8d080" stop-opacity="0.5"/><stop offset="30%" stop-color="#c4a043" stop-opacity="0.2"/><stop offset="70%" stop-color="#c4a043" stop-opacity="0.05"/><stop offset="100%" stop-color="#c4a043" stop-opacity="0"/></radialGradient>
<filter id="hb" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="45"/></filter>
<filter id="mb" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="12"/></filter>
<filter id="gl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="sg" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1400" height="1400" fill="url(#bg)"/>

<!-- Sparse stars -->
<g fill="#fff" opacity="0.3">
<circle cx="80" cy="120" r="0.8"/><circle cx="250" cy="60" r="0.6"/><circle cx="400" cy="100" r="1"/><circle cx="580" cy="50" r="0.7"/><circle cx="750" cy="80" r="0.9"/><circle cx="920" cy="40" r="0.7"/><circle cx="1100" cy="90" r="1.1"/><circle cx="1300" cy="70" r="0.6"/><circle cx="150" cy="250" r="0.7"/><circle cx="380" cy="220" r="0.9"/><circle cx="600" cy="280" r="0.6"/><circle cx="850" cy="240" r="0.8"/><circle cx="1050" cy="260" r="0.7"/><circle cx="1250" cy="230" r="0.9"/>
</g>

<!-- Core glow -->
<circle cx="700" cy="700" r="280" fill="url(#coreG)"/>

<!-- CONSTELLATION MAP — star-like nodes with connecting lines forming an abstract stellar pattern -->
<!-- Primary constellation: large diamond/orbital shape -->
<circle cx="700" cy="300" r="6" fill="#e8d080" opacity="0.9" filter="url(#sg)"/>
<circle cx="1000" cy="530" r="5" fill="#c4a043" opacity="0.8" filter="url(#sg)"/>
<circle cx="1000" cy="870" r="5" fill="#c4a043" opacity="0.8" filter="url(#sg)"/>
<circle cx="700" cy="1100" r="6" fill="#e8d080" opacity="0.9" filter="url(#sg)"/>
<circle cx="400" cy="870" r="5" fill="#c4a043" opacity="0.8" filter="url(#sg)"/>
<circle cx="400" cy="530" r="5" fill="#c4a043" opacity="0.8" filter="url(#sg)"/>

<!-- Center star -->
<circle cx="700" cy="700" r="8" fill="#f5ecc0" opacity="0.95" filter="url(#gl)"/>
<circle cx="700" cy="700" r="20" fill="#e8d080" opacity="0.1" filter="url(#mb)"/>

<!-- Orbital ellipse (faint ring) -->
<ellipse cx="700" cy="700" rx="360" ry="180" fill="none" stroke="#c4a043" stroke-width="0.8" opacity="0.2" transform="rotate(25,700,700)"/>
<ellipse cx="700" cy="700" rx="300" ry="400" fill="none" stroke="#c4a043" stroke-width="0.5" opacity="0.12" transform="rotate(-15,700,700)"/>

<!-- Connections: hexagonal -->
<g stroke="#c4a043" stroke-width="0.8" fill="none" opacity="0.35">
<path d="M 700,300 L 1000,530"/><path d="M 1000,530 L 1000,870"/><path d="M 1000,870 L 700,1100"/>
<path d="M 700,1100 L 400,870"/><path d="M 400,870 L 400,530"/><path d="M 400,530 L 700,300"/>
</g>

<!-- Connections to center -->
<g stroke="#e8d080" stroke-width="0.4" fill="none" opacity="0.18">
<path d="M 700,300 L 700,700"/><path d="M 1000,530 L 700,700"/><path d="M 1000,870 L 700,700"/>
<path d="M 700,1100 L 700,700"/><path d="M 400,870 L 700,700"/><path d="M 400,530 L 700,700"/>
</g>

<!-- Cross-connections (inner web) -->
<g stroke="#c4a043" stroke-width="0.3" fill="none" opacity="0.12">
<path d="M 700,300 L 1000,870"/><path d="M 700,300 L 400,870"/>
<path d="M 1000,530 L 400,870"/><path d="M 1000,530 L 400,530"/>
<path d="M 1000,870 L 400,530"/><path d="M 700,1100 L 1000,530"/>
<path d="M 700,1100 L 400,530"/>
</g>

<!-- Secondary nodes (dimmer stars) -->
<g fill="#c4a043" opacity="0.5" filter="url(#sg)">
<circle cx="850" cy="400" r="3"/><circle cx="850" cy="1000" r="3"/>
<circle cx="550" cy="400" r="3"/><circle cx="550" cy="1000" r="3"/>
<circle cx="1150" cy="700" r="3"/><circle cx="250" cy="700" r="3"/>
</g>

<!-- Secondary connections -->
<g stroke="#c4a043" stroke-width="0.3" fill="none" opacity="0.15">
<path d="M 850,400 L 700,300"/><path d="M 850,400 L 1000,530"/><path d="M 850,400 L 700,700"/>
<path d="M 550,400 L 700,300"/><path d="M 550,400 L 400,530"/><path d="M 550,400 L 700,700"/>
<path d="M 850,1000 L 1000,870"/><path d="M 850,1000 L 700,1100"/><path d="M 850,1000 L 700,700"/>
<path d="M 550,1000 L 400,870"/><path d="M 550,1000 L 700,1100"/><path d="M 550,1000 L 700,700"/>
<path d="M 1150,700 L 1000,530"/><path d="M 1150,700 L 1000,870"/><path d="M 1150,700 L 700,700"/>
<path d="M 250,700 L 400,530"/><path d="M 250,700 L 400,870"/><path d="M 250,700 L 700,700"/>
</g>

<!-- Tertiary faint stars scattered -->
<g fill="#c4a043" opacity="0.3">
<circle cx="200" cy="350" r="1.5"/><circle cx="300" cy="500" r="1.2"/><circle cx="180" cy="850" r="1.3"/><circle cx="320" cy="950" r="1.5"/>
<circle cx="1200" cy="350" r="1.5"/><circle cx="1100" cy="500" r="1.2"/><circle cx="1220" cy="850" r="1.3"/><circle cx="1080" cy="950" r="1.5"/>
<circle cx="600" cy="200" r="1.2"/><circle cx="800" cy="200" r="1.3"/><circle cx="600" cy="1200" r="1.2"/><circle cx="800" cy="1200" r="1.3"/>
<circle cx="450" cy="600" r="1"/><circle cx="950" cy="600" r="1"/><circle cx="450" cy="800" r="1"/><circle cx="950" cy="800" r="1"/>
</g>

<!-- Pulsing rings from center -->
<circle cx="700" cy="700" r="50" fill="none" stroke="#e8d080" stroke-width="0.8" opacity="0.4">


</circle>
<circle cx="700" cy="700" r="80" fill="none" stroke="#c4a043" stroke-width="0.5" opacity="0.25">


</circle>
<circle cx="700" cy="700" r="120" fill="none" stroke="#c4a043" stroke-width="0.3" opacity="0.15">


</circle>

<!-- Bottom accent -->
<g stroke="#c4a043" stroke-width="0.4" fill="none" opacity="0.1">
<path d="M 0,1250 Q 200,1245 400,1250 Q 600,1255 800,1248 Q 1000,1242 1200,1250 Q 1350,1255 1400,1250"/>
<path d="M 0,1280 Q 200,1275 400,1280 Q 600,1285 800,1278 Q 1000,1272 1200,1280 Q 1350,1285 1400,1280"/>
</g>
<rect x="0" y="1280" width="1400" height="120" fill="#030302" opacity="0.5"/>
</svg></body></html>
