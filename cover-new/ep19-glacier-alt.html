<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box;}</style></head><body>
<svg viewBox="0 0 1400 1400" width="1400" height="1400" xmlns="http://www.w3.org/2000/svg">
<defs>
<radialGradient id="bg" cx="50%" cy="70%" r="70%"><stop offset="0%" stop-color="#0a1525"/><stop offset="50%" stop-color="#060c18"/><stop offset="100%" stop-color="#02050a"/></radialGradient>
<filter id="hb" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="45"/></filter>
<filter id="mb" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="12"/></filter>
<filter id="gl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="sg" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1400" height="1400" fill="url(#bg)"/>

<!-- Stars — dense, arctic sky -->
<g fill="#fff" opacity="0.5">
<circle cx="80" cy="60" r="1"/><circle cx="200" cy="90" r="0.8"/><circle cx="350" cy="40" r="1.2"/><circle cx="500" cy="100" r="0.7"/><circle cx="650" cy="50" r="1.1"/><circle cx="800" cy="80" r="0.9"/><circle cx="950" cy="45" r="1.3"/><circle cx="1100" cy="70" r="0.8"/><circle cx="1250" cy="55" r="1"/><circle cx="1350" cy="90" r="0.7"/>
<circle cx="150" cy="180" r="0.9"/><circle cx="300" cy="150" r="1.2"/><circle cx="470" cy="200" r="0.6"/><circle cx="620" cy="170" r="1"/><circle cx="780" cy="190" r="0.8"/><circle cx="930" cy="160" r="1.1"/><circle cx="1080" cy="180" r="0.7"/><circle cx="1230" cy="200" r="0.9"/>
<circle cx="100" cy="300" r="0.7"/><circle cx="260" cy="280" r="1"/><circle cx="420" cy="310" r="0.8"/><circle cx="580" cy="290" r="1.2"/><circle cx="740" cy="320" r="0.6"/><circle cx="900" cy="300" r="1"/><circle cx="1060" cy="280" r="0.8"/><circle cx="1210" cy="310" r="0.7"/>
</g>
<!-- Bright stars -->
<g fill="#ffe8b0" opacity="0.6" filter="url(#sg)">
<circle cx="400" cy="70" r="2.5"/><circle cx="900" cy="90" r="2"/><circle cx="1200" cy="60" r="2.2"/>
</g>

<!-- GLACIER — massive ice forms from bottom -->
<g fill="#1a3050">
<!-- Main glacier mass -->
<path d="M 0,1400 L 0,800 Q 100,750 200,780 Q 300,700 400,720 Q 500,650 600,680 Q 700,600 800,650 Q 900,680 1000,720 Q 1100,700 1200,750 Q 1300,780 1400,800 L 1400,1400 Z"/>
</g>
<!-- Ice surface highlights -->
<path d="M 200,780 Q 300,700 400,720 Q 500,650 600,680 Q 700,600 800,650 Q 900,680 1000,720 Q 1100,700 1200,750" stroke="#4a8ab0" stroke-width="1" fill="none" opacity="0.4" filter="url(#gl)"/>

<!-- Ice cracks -->
<g stroke="#6aa0c0" stroke-width="0.5" fill="none" opacity="0.25">
<path d="M 300,750 Q 350,800 400,850"/><path d="M 500,700 Q 520,760 540,820"/><path d="M 700,650 Q 710,720 720,800"/><path d="M 900,700 Q 880,760 870,830"/><path d="M 1100,720 Q 1080,780 1070,850"/>
<path d="M 200,780 Q 250,850 280,920"/><path d="M 600,680 Q 620,750 610,830"/><path d="M 1000,720 Q 980,800 990,880"/>
</g>

<!-- Crevasse — deep blue -->
<path d="M 600,800 Q 620,850 650,900 Q 660,950 640,1000" stroke="#1a4070" stroke-width="3" fill="none" opacity="0.5"/>
<path d="M 600,800 Q 620,850 650,900 Q 660,950 640,1000" stroke="#2a5a90" stroke-width="1" fill="none" opacity="0.6" filter="url(#gl)"/>

<!-- Ice crystal sparkles -->
<g filter="url(#sg)">
<circle cx="350" cy="750" r="2" fill="#8ac0e0" opacity="0.5"/><circle cx="550" cy="700" r="2.5" fill="#a0d0f0" opacity="0.6"/><circle cx="750" cy="670" r="2" fill="#8ac0e0" opacity="0.5"/>
<circle cx="950" cy="720" r="1.8" fill="#a0d0f0" opacity="0.45"/><circle cx="1150" cy="740" r="2.2" fill="#8ac0e0" opacity="0.5"/><circle cx="450" cy="720" r="1.5" fill="#c4a043" opacity="0.4"/><circle cx="850" cy="700" r="1.8" fill="#c4a043" opacity="0.35"/>
</g>

<!-- Northern lights hint (faint green) -->
<ellipse cx="700" cy="250" rx="500" ry="80" fill="#20a060" opacity="0.04" filter="url(#hb)"/>
<path d="M 100,300 Q 250,200 400,280 Q 550,350 700,250 Q 850,180 1000,280 Q 1150,350 1300,300" stroke="#40d080" stroke-width="40" fill="none" opacity="0.06" filter="url(#hb)"/>
<path d="M 200,350 Q 350,280 500,330 Q 650,380 800,290 Q 950,220 1100,320" stroke="#60d0a0" stroke-width="2" fill="none" opacity="0.15" filter="url(#gl)"/>

<!-- Cold blue particles -->
<g fill="#80c0e0" opacity="0.2">
<circle cx="400" cy="500" r="1"><animate attributeName="cy" values="500;400;500" dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.03;0.2" dur="6s" repeatCount="indefinite"/></circle>
<circle cx="700" cy="550" r="1.2"><animate attributeName="cy" values="550;430;550" dur="5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.25;0.04;0.25" dur="5s" repeatCount="indefinite"/></circle>
<circle cx="1000" cy="480" r="0.8"><animate attributeName="cy" values="480;380;480" dur="7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.18;0.03;0.18" dur="7s" repeatCount="indefinite"/></circle>
</g>

<!-- Bottom -->
<rect x="0" y="1200" width="1400" height="200" fill="#02050a" opacity="0.3"/>
</svg></body></html>
