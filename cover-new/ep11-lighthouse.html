<!DOCTYPE html><html><head><meta charset="utf-8"><title>SleepSchool E11 - The Last Lighthouse Keeper</title><style>*{margin:0;padding:0}body{background:#03040d;display:flex;justify-content:center;align-items:center;min-height:100vh}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
<defs>
<filter id="hb"><feGaussianBlur stdDeviation="40"/></filter>
<filter id="mb"><feGaussianBlur stdDeviation="12"/></filter>
<filter id="gl"><feGaussianBlur stdDeviation="5"/></filter>
<filter id="sg"><feGaussianBlur stdDeviation="3"/></filter>
<linearGradient id="stormSky" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#050812"/><stop offset="40%" stop-color="#0a1025"/><stop offset="100%" stop-color="#0d1430"/></linearGradient>
</defs>
<rect width="1000" height="1000" fill="url(#stormSky)"/>
<!-- Stars (barely visible in storm) -->
<g fill="#fff" opacity="0.15">
<circle cx="100" cy="80" r="1"/><circle cx="300" cy="50" r="1.2"/><circle cx="500" cy="70" r="0.8"/>
<circle cx="700" cy="40" r="1"/><circle cx="900" cy="60" r="1.1"/><circle cx="200" cy="120" r="0.7"/>
<circle cx="600" cy="100" r="0.9"/><circle cx="800" cy="130" r="0.8"/><circle cx="50" cy="150" r="0.6"/>
<circle cx="450" cy="140" r="1"/><circle cx="750" cy="170" r="0.7"/><circle cx="950" cy="110" r="0.8"/>
</g>
<!-- Lightning bolt -->
<path d="M280,40 L240,160 L290,140 L230,320 L260,300 L180,480" stroke="#e0e8f0" stroke-width="3" fill="none" opacity="0.9"/>
<path d="M285,40 L245,160 L295,140 L235,320 L265,300 L185,480" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.6"/>
<!-- Lightning flash on clouds -->
<ellipse cx="250" cy="150" rx="180" ry="100" fill="#fff" opacity="0.03" filter="url(#mb)"/>
<ellipse cx="260" cy="300" rx="100" ry="120" fill="#fff" opacity="0.02" filter="url(#mb)"/>
<!-- Dark churning clouds -->
<g filter="url(#mb)">
<ellipse cx="200" cy="120" rx="250" ry="70" fill="#080d1a" opacity="0.6"/>
<ellipse cx="350" cy="80" rx="200" ry="60" fill="#0a1020" opacity="0.5"/>
<ellipse cx="550" cy="100" rx="280" ry="80" fill="#080d1a" opacity="0.55"/>
<ellipse cx="750" cy="90" rx="220" ry="65" fill="#0a1020" opacity="0.45"/>
<ellipse cx="900" cy="130" rx="180" ry="55" fill="#080d1a" opacity="0.5"/>
</g>
<!-- Cloud details -->
<g filter="url(#sg)">
<ellipse cx="300" cy="150" rx="120" ry="40" fill="#0e1530" opacity="0.4"/>
<ellipse cx="600" cy="140" rx="150" ry="45" fill="#0e1530" opacity="0.35"/>
<ellipse cx="850" cy="170" rx="100" ry="35" fill="#0e1530" opacity="0.3"/>
</g>
<!-- Rain streaks -->
<g stroke="#4a6080" stroke-width="0.8" fill="none" opacity="0.25">
<path d="M50,150 L40,350"/><path d="M80,130 L65,330"/><path d="M120,160 L105,360"/><path d="M180,140 L165,340"/>
<path d="M220,170 L210,370"/><path d="M280,150 L265,350"/><path d="M350,140 L340,340"/>
<path d="M400,160 L385,360"/><path d="M460,150 L450,350"/><path d="M520,170 L510,370"/>
<path d="M580,140 L565,340"/><path d="M640,160 L630,360"/><path d="M700,150 L685,350"/>
<path d="M760,170 L750,370"/><path d="M820,140 L810,340"/><path d="M880,160 L865,360"/>
<path d="M940,150 L930,350"/><path d="M110,200 L95,400"/><path d="M250,200 L235,400"/>
<path d="M390,190 L380,390"/><path d="M530,210 L515,410"/><path d="M670,190 L660,390"/>
<path d="M810,200 L800,400"/><path d="M950,180 L940,380"/><path d="M160,220 L150,420"/>
<path d="M300,220 L285,420"/><path d="M450,230 L440,430"/><path d="M590,210 L580,410"/>
<path d="M730,230 L720,430"/><path d="M870,220 L860,420"/>
</g>
<!-- Dark churning waves -->
<path d="M0,800 Q100,780 200,800 Q300,820 400,800 Q500,780 600,800 Q700,820 800,800 Q900,780 1000,800 L1000,1000 L0,1000Z" fill="#060b18"/>
<path d="M0,830 Q120,810 240,830 Q360,850 480,830 Q600,810 720,830 Q840,850 960,830 Q980,825 1000,830 L1000,1000 L0,1000Z" fill="#040810"/>
<path d="M0,870 Q150,850 300,870 Q450,890 600,870 Q750,850 900,870 Q950,875 1000,870 L1000,1000 L0,1000Z" fill="#02060c"/>
<!-- Wave crest highlights -->
<path d="M120,810 Q200,800 280,810" stroke="#c4a043" stroke-width="0.8" fill="none" opacity="0.15"/>
<path d="M380,830 Q460,820 540,830" stroke="#c4a043" stroke-width="0.8" fill="none" opacity="0.12"/>
<path d="M620,810 Q700,800 780,810" stroke="#c4a043" stroke-width="0.8" fill="none" opacity="0.15"/>
<path d="M850,830 Q900,825 950,830" stroke="#c4a043" stroke-width="0.8" fill="none" opacity="0.1"/>
<!-- Rain on water -->
<g stroke="#6a8098" stroke-width="0.5" fill="none" opacity="0.15">
<circle cx="200" cy="820" r="6"/><circle cx="400" cy="850" r="5"/><circle cx="600" cy="840" r="7"/>
<circle cx="800" cy="860" r="5"/><circle cx="300" cy="880" r="6"/><circle cx="500" cy="890" r="5"/>
<circle cx="700" cy="870" r="6"/><circle cx="900" cy="880" r="5"/><circle cx="150" cy="850" r="4"/>
<circle cx="350" cy="870" r="6"/><circle cx="550" cy="860" r="5"/><circle cx="750" cy="890" r="6"/>
</g>
<!-- THE MASSIVE LIGHTHOUSE - centered, filling frame -->
<g>
<!-- Base rock -->
<ellipse cx="500" cy="920" rx="180" ry="30" fill="#060a14"/>
<!-- Base -->
<rect x="460" y="750" width="80" height="180" fill="#0d1225"/>
<rect x="455" y="740" width="90" height="15" fill="#090d1a"/>
<!-- Mid tower -->
<rect x="465" y="520" width="70" height="230" fill="#0e1330"/>
<rect x="470" y="520" width="60" height="230" fill="#111838" opacity="0.5"/>
<!-- Red stripe -->
<rect x="463" y="580" width="74" height="25" fill="#1a1018"/>
<!-- Upper tower -->
<rect x="470" y="400" width="60" height="120" fill="#0e1330"/>
<!-- Gallery deck -->
<rect x="455" y="390" width="90" height="12" fill="#0a0e1e"/>
<rect x="450" y="385" width="100" height="6" fill="#080c18"/>
<!-- Lantern room -->
<rect x="475" y="320" width="50" height="65" fill="#1a2040" opacity="0.3"/>
<rect x="478" y="325" width="44" height="55" fill="#c4a043" opacity="0.15"/>
<!-- Roof -->
<path d="M470,320 L530,320 L515,270 L485,270Z" fill="#080c18"/>
<path d="M475,320 L525,320 L510,285 L490,285Z" fill="#0a1020"/>
<!-- Top finial -->
<rect x="498" y="255" width="4" height="20" fill="#080c18"/>
<circle cx="500" cy="255" r="4" fill="#080c18"/>
<!-- Window dots -->
<circle cx="490" cy="550" r="3" fill="#050810"/>
<circle cx="510" cy="550" r="3" fill="#050810"/>
<circle cx="490" cy="600" r="3" fill="#050810"/>
<circle cx="510" cy="600" r="3" fill="#050810"/>
<circle cx="490" cy="650" r="3" fill="#050810"/>
<circle cx="510" cy="650" r="3" fill="#050810"/>
<circle cx="490" cy="700" r="3" fill="#050810"/>
<circle cx="510" cy="700" r="3" fill="#050810"/>
</g>
<!-- Light beam sweeping -->
<g filter="url(#gl)">
<path d="M500,355 Q600,200 900,50" stroke="#fff" stroke-width="4" fill="none" opacity="0.25"/>
<path d="M500,355 Q620,220 920,100" stroke="#fff" stroke-width="2" fill="none" opacity="0.35"/>
</g>
<g filter="url(#mb)">
<path d="M500,355 Q580,180 880,30" stroke="#f0e8c0" stroke-width="18" fill="none" opacity="0.12"/>
<path d="M500,355 Q640,240 940,130" stroke="#f0e8c0" stroke-width="15" fill="none" opacity="0.1"/>
</g>
<!-- Beam cone glow -->
<path d="M500,355 L920,20 L940,160Z" fill="#fff" opacity="0.04" filter="url(#mb)"/>
<!-- Lightning glow on lighthouse -->
<ellipse cx="500" cy="550" rx="120" ry="200" fill="#fff" opacity="0.02" filter="url(#mb)"/>
</svg>
</body></html>
