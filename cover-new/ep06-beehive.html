<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>body{margin:0;padding:0;background:#0a0806;display:flex;align-items:center;justify-content:center;height:100vh;}</style></head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1400" width="1400" height="1400">
  <defs>
    <radialGradient id="bg6" cx="50%" cy="48%" r="65%">
      <stop offset="0%" stop-color="#1a1408"/>
      <stop offset="50%" stop-color="#0e0a06"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </radialGradient>
    <radialGradient id="glow6" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a030" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#c49020" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c49020" stop-opacity="0"/>
    </radialGradient>
    <filter id="hexglow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="inner6">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="queen6">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1400" height="1400" fill="url(#bg6)"/>
  <ellipse cx="700" cy="700" rx="300" ry="280" fill="url(#glow6)"/>

  <!-- Partial cells at edges -->
  <g opacity="0.12" filter="url(#hexglow)">
    <path d="M 340,340 L 370,323 L 400,340 L 400,374 L 370,391 L 340,374 Z" fill="none" stroke="#d4a030" stroke-width="0.8"/>
    <path d="M 400,340 L 430,323 L 460,340 L 460,374" fill="none" stroke="#d4a030" stroke-width="0.5" opacity="0.6"/>
  </g>
  <g opacity="0.1" filter="url(#hexglow)">
    <path d="M 960,310 L 990,293 L 1020,310 L 1020,344 L 990,361 L 960,344 Z" fill="none" stroke="#d4a030" stroke-width="0.7"/>
  </g>
  <g opacity="0.08" filter="url(#hexglow)">
    <path d="M 280,600 L 310,583 L 340,600 L 340,634 L 310,651 L 280,634 Z" fill="none" stroke="#d4a030" stroke-width="0.6"/>
  </g>
  <g opacity="0.09" filter="url(#hexglow)">
    <path d="M 1060,650 L 1090,633 L 1120,650 L 1120,684 L 1090,701 L 1060,684 Z" fill="none" stroke="#d4a030" stroke-width="0.6"/>
  </g>
  <g opacity="0.06" filter="url(#hexglow)">
    <path d="M 380,960 L 410,943 L 440,960 L 440,994 L 410,1011" fill="none" stroke="#d4a030" stroke-width="0.5"/>
  </g>
  <g opacity="0.07" filter="url(#hexglow)">
    <path d="M 960,990 L 990,973 L 1020,990 L 1020,1024" fill="none" stroke="#d4a030" stroke-width="0.5"/>
  </g>

  <!-- Main hexagonal cell -->
  <g filter="url(#hexglow)">
    <polygon points="700,490 790,540 790,640 700,690 610,640 610,540"
             fill="none" stroke="#d4a030" stroke-width="2" opacity="0.85"/>
  </g>

  <!-- Inner hexagon -->
  <g filter="url(#inner6)">
    <polygon points="700,565 745,595 745,645 700,675 655,645 655,595"
             fill="none" stroke="#c49020" stroke-width="1.5" opacity="0.55"/>
  </g>

  <!-- Deepest inner hex -->
  <g filter="url(#inner6)">
    <polygon points="700,620 722,635 722,655 700,670 678,655 678,635"
             fill="none" stroke="#b88a18" stroke-width="1" opacity="0.35"/>
  </g>

  <!-- The queen dot -->
  <circle cx="700" cy="650" r="18" fill="#d4a030" opacity="0.15" filter="url(#queen6)">
    <animate attributeName="r" values="18;22;18" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="650" r="5" fill="#eed880" opacity="0.95" filter="url(#hexglow)">
    <animate attributeName="opacity" values="0.95;0.7;0.95" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="650" r="2" fill="#fff8e0" opacity="1"/>

  <!-- Faint lines to void -->
  <g stroke="#d4a030" stroke-width="0.4" opacity="0.1">
    <line x1="610" y1="540" x2="400" y2="400"/>
    <line x1="790" y1="540" x2="1000" y2="400"/>
    <line x1="610" y1="640" x2="400" y2="780"/>
    <line x1="790" y1="640" x2="1000" y2="780"/>
    <line x1="700" y1="490" x2="700" y2="340"/>
    <line x1="700" y1="690" x2="700" y2="900"/>
  </g>
</svg>
</body>
</html>
