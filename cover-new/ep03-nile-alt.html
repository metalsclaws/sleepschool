<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box;}</style></head><body>
<svg viewBox="0 0 1400 1400" width="1400" height="1400" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0815"/><stop offset="50%" stop-color="#1a1028"/><stop offset="100%" stop-color="#2a1820"/></linearGradient>
<radialGradient id="moonG" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ffe8b0" stop-opacity="0.4"/><stop offset="30%" stop-color="#c4a043" stop-opacity="0.15"/><stop offset="100%" stop-color="#c4a043" stop-opacity="0"/></radialGradient>
<filter id="hb" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="45"/></filter>
<filter id="mb" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="12"/></filter>
<filter id="gl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="sg" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1400" height="1400" fill="url(#sky)"/>

<!-- Stars — desert night -->
<g fill="#fff" opacity="0.5">
<circle cx="120" cy="60" r="1.2"/><circle cx="280" cy="45" r="0.9"/><circle cx="450" cy="80" r="1.4"/><circle cx="620" cy="35" r="1"/><circle cx="800" cy="70" r="1.3"/><circle cx="980" cy="50" r="0.8"/><circle cx="1150" cy="65" r="1.1"/><circle cx="1320" cy="40" r="0.9"/>
<circle cx="80" cy="180" r="0.8"/><circle cx="250" cy="160" r="1.2"/><circle cx="430" cy="200" r="0.7"/><circle cx="600" cy="170" r="1.3"/><circle cx="780" cy="190" r="0.9"/><circle cx="950" cy="155" r="1.1"/><circle cx="1120" cy="185" r="0.8"/><circle cx="1300" cy="170" r="1"/>
<circle cx="180" cy="310" r="1"/><circle cx="370" cy="280" r="0.7"/><circle cx="550" cy="320" r="1.1"/><circle cx="720" cy="290" r="0.9"/><circle cx="890" cy="310" r="1.2"/><circle cx="1060" cy="270" r="0.8"/><circle cx="1230" cy="300" r="1"/>
</g>
<g fill="#ffe8b0" opacity="0.6" filter="url(#sg)">
<circle cx="350" cy="90" r="2.5"/><circle cx="700" cy="55" r="2"/><circle cx="1050" cy="75" r="2.8"/>
</g>

<!-- Milky Way -->
<ellipse cx="700" cy="120" rx="550" ry="70" fill="#fff" opacity="0.04" filter="url(#hb)" transform="rotate(-8,700,120)"/>

<!-- FULL MOON — large, low on horizon -->
<circle cx="1050" cy="480" r="180" fill="url(#moonG)"/>
<circle cx="1050" cy="480" r="80" fill="#e8d080" opacity="0.12" filter="url(#mb)"/>
<circle cx="1050" cy="480" r="55" fill="#ffe8b0" opacity="0.7" filter="url(#gl)"/>
<circle cx="1050" cy="480" r="55" fill="#f5ecc0" opacity="0.5"/>
<!-- Moon surface hints -->
<circle cx="1035" cy="468" r="8" fill="#d4b870" opacity="0.15"/>
<circle cx="1060" cy="495" r="5" fill="#d4b870" opacity="0.12"/>
<circle cx="1040" cy="500" r="6" fill="#d4b870" opacity="0.1"/>

<!-- DESERT DUNES — overlapping curves -->
<path d="M 0,850 Q 150,780 300,830 Q 450,880 600,820 Q 750,770 900,830 Q 1050,880 1200,820 Q 1350,770 1400,810" fill="#1a1020" opacity="0.8"/>
<path d="M 0,880 Q 200,830 400,870 Q 600,910 800,860 Q 1000,820 1200,870 Q 1350,900 1400,870" fill="#141018" opacity="0.9"/>
<path d="M 0,900 Q 250,870 500,900 Q 750,930 1000,890 Q 1250,860 1400,900" fill="#100c15" opacity="0.95"/>

<!-- CAMEL CARAVAN — silhouettes on near dune -->
<g fill="#0a0810" opacity="0.85">
<!-- Camel 1 -->
<g transform="translate(350,830) scale(0.9)">
<path d="M 0,0 L 0,-30 Q 0,-35 5,-38 L 10,-50 L 12,-38 Q 12,-35 8,-30 L 8,0 Z"/>
<path d="M 5,-38 L 8,-45 L 15,-50 L 18,-42 L 10,-38 Z"/>
<ellipse cx="18" cy="-42" rx="12" ry="5"/>
<path d="M 8,0 L 25,0 L 25,-15 L 20,-15 L 20,-5 L 5,-5 L 5,0 Z"/>
</g>
<!-- Camel 2 -->
<g transform="translate(420,828) scale(0.85)">
<path d="M 0,0 L 0,-28 Q 0,-33 5,-36 L 10,-48 L 12,-36 Q 12,-33 8,-28 L 8,0 Z"/>
<path d="M 5,-36 L 8,-43 L 15,-48 L 18,-40 L 10,-36 Z"/>
<ellipse cx="18" cy="-40" rx="11" ry="4.5"/>
<path d="M 8,0 L 23,0 L 23,-13 L 18,-13 L 18,-5 L 5,-5 L 5,0 Z"/>
</g>
<!-- Camel 3 (smaller, further) -->
<g transform="translate(490,832) scale(0.7)">
<path d="M 0,0 L 0,-25 Q 0,-30 5,-33 L 10,-42 L 12,-33 Q 12,-30 8,-25 L 8,0 Z"/>
<path d="M 5,-33 L 8,-38 L 14,-42 L 16,-36 L 10,-33 Z"/>
<ellipse cx="16" cy="-36" rx="9" ry="4"/>
</g>
<!-- Rider figure on camel 1 -->
<circle cx="360" cy="785" r="3" fill="#0a0810"/>
<path d="M 360,788 L 358,805" stroke="#0a0810" stroke-width="1.5" fill="none"/>
</g>

<!-- Nile — reflective water stripe -->
<rect x="0" y="930" width="1400" height="80" fill="#0a1025" opacity="0.6"/>
<g stroke="#c4a043" stroke-width="0.4" fill="none" opacity="0.3">
<path d="M 100,945 Q 250,940 400,945"/><path d="M 600,950 Q 750,945 900,950"/><path d="M 1000,948 Q 1150,943 1300,948"/>
<path d="M 200,965 Q 350,960 500,965"/><path d="M 700,960 Q 850,955 1000,960"/><path d="M 1100,963 Q 1250,958 1400,963"/>
</g>

<!-- Moon reflection in water -->
<ellipse cx="1050" cy="960" rx="30" ry="10" fill="#ffe8b0" opacity="0.15" filter="url(#mb)"/>

<!-- Palm trees silhouettes — far right -->
<g fill="#0a0810" opacity="0.9">
<path d="M 1280,930 Q 1270,830 1265,730" stroke="#0a0810" stroke-width="5" fill="none"/>
<ellipse cx="1265" cy="730" rx="55" ry="22" transform="rotate(-8,1265,730)"/>
<ellipse cx="1250" cy="745" rx="45" ry="18" transform="rotate(-20,1250,745)"/>
<ellipse cx="1280" cy="738" rx="50" ry="20" transform="rotate(12,1280,738)"/>
<ellipse cx="1260" cy="720" rx="40" ry="16" transform="rotate(-35,1260,720)"/>
<ellipse cx="1275" cy="718" rx="48" ry="19" transform="rotate(20,1275,718)"/>
</g>

<!-- Distant pyramid silhouettes — tiny, far horizon -->
<g fill="#1a1020" opacity="0.4">
<path d="M 700,840 L 740,790 L 780,840"/>
<path d="M 820,840 L 850,800 L 880,840"/>
</g>

<!-- Shooting star -->
<path d="M 200,120 L 260,150" stroke="#ffe8b0" stroke-width="1.5" fill="none" opacity="0.6" filter="url(#sg)"/>
<circle cx="200" cy="120" r="1" fill="#ffe8b0" opacity="0.8"/>

<!-- Bottom fade -->
<path d="M 0,980 Q 200,975 400,980 Q 600,985 800,978 Q 1000,972 1200,980 Q 1350,985 1400,980" stroke="#c4a043" stroke-width="0.5" fill="none" opacity="0.15"/>
<rect x="0" y="980" width="1400" height="420" fill="#0a0815" opacity="0.6"/>
</svg></body></html>
