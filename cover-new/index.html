<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SleepSchool — Cover Art Review</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #08080e; color: #d0c8b8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; }
.header { text-align: center; padding: 30px 20px 20px; border-bottom: 1px solid #1a1a28; }
.header h1 { font-family: Georgia, serif; font-size: 24px; color: #c4a043; letter-spacing: 1px; }
.header p { color: #666; font-size: 13px; margin-top: 6px; }
.grid { max-width: 1600px; margin: 0 auto; padding: 20px; }
.ep { margin-bottom: 40px; border-bottom: 1px solid #1a1a28; padding-bottom: 30px; }
.ep h2 { font-family: Georgia, serif; font-size: 16px; color: #c4a043; margin-bottom: 12px; letter-spacing: 0.5px; }
.ep .variants { display: flex; gap: 12px; flex-wrap: wrap; }
.ep .card { flex: 1; min-width: 280px; max-width: 420px; }
.ep .card img { width: 100%; height: auto; border-radius: 6px; display: block; background: #0c0c14; }
.ep .card .tag { display: inline-block; margin-top: 6px; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-family: monospace; }
.ep .card .tag.orig { background: #1a1a28; color: #888; }
.ep .card .tag.v2 { background: #1a2028; color: #6a8fa5; }
.ep .card .tag.v3 { background: #1a1a20; color: #a08cc4; }
.ep .card .tag.alt { background: #1a1a18; color: #c4a043; }
.ep .card .tag.new { background: #281a0a; color: #c4a043; border: 1px solid #c4a04344; }
</style>
</head>
<body>
<div class="header">
<h1>SleepSchool Cover Art</h1>
<p>Original designs &amp; alternates — click any image to view full size</p>
</div>
<div class="grid" id="gallery"></div>

const gallery = document.getElementById('gallery');
episodes.forEach(ep => {
  const div = document.createElement('div');
  div.className = 'ep';
  let html = `<h2>Ep ${ep.num}: ${ep.name}</h2><div class="variants">`;
  ep.variants.forEach(v => {
    html += `<div class="card">
      <a href="${v.file}.html" target="_blank"><img src="${v.file}.png" alt="Ep ${ep.num} ${v.tag}" loading="lazy"></a>
      <span class="tag ${v.cls}">${v.tag}</span>
    </div>`;
  });
  html += '</div>';
  div.innerHTML = html;
  gallery.appendChild(div);
});
