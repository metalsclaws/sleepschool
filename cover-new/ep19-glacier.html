<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box;}</style></head><body>
<svg viewBox="0 0 1400 1400" width="1400" height="1400" xmlns="http://www.w3.org/2000/svg">
<defs><radialGradient id="bg" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#0e1825"/><stop offset="50%" stop-color="#080e18"/><stop offset="100%" stop-color="#030508"/></radialGradient>
<filter id="hb" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="50"/></filter>
<filter id="mb" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="15"/></filter>
<filter id="gl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="sg" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1400" height="1400" fill="url(#bg)"/>
<g fill="#fff" opacity="0.3"><circle cx="100" cy="40" r="0.8"/><circle cx="300" cy="70" r="1"/><circle cx="550" cy="50" r="0.7"/><circle cx="800" cy="80" r="1.1"/><circle cx="1050" cy="45" r="0.9"/><circle cx="1250" cy="75" r="1"/><circle cx="200" cy="160" r="0.8"/><circle cx="450" cy="140" r="1"/><circle cx="700" cy="180" r="0.9"/><circle cx="950" cy="150" r="1.1"/><circle cx="1200" cy="170" r="0.8"/><circle cx="1350" cy="190" r="1"/></g>
<!-- GLACIER WALL — massive, frame-filling -->
<g>
<path d="M 0,900 L 150,300 L 300,200 L 450,350 L 600,180 L 750,280 L 900,150 L 1050,320 L 1200,220 L 1350,380 L 1400,900 Z" fill="#0e1a25"/>
<!-- Ice face highlights — gold catching cracks -->
<path d="M 150,300 L 300,200 L 450,350" stroke="#c4a043" stroke-width="1.5" fill="none" opacity="0.35"/><path d="M 600,180 L 750,280 L 900,150" stroke="#c4a043" stroke-width="2" fill="none" opacity="0.4"/><path d="M 1050,320 L 1200,220 L 1350,380" stroke="#c4a043" stroke-width="1.5" fill="none" opacity="0.35"/>
<!-- Deep cracks in ice — blue-white -->
<g stroke="#80b0d0" stroke-width="0.8" fill="none" opacity="0.3"><path d="M 200,350 L 250,500 L 230,700"/><path d="M 350,300 L 380,450 L 360,650"/><path d="M 500,250 L 520,400 L 490,600"/><path d="M 650,280 L 680,420 L 660,620"/><path d="M 800,220 L 830,380 L 810,580"/><path d="M 950,280 L 980,430 L 960,630"/><path d="M 1100,300 L 1130,450 L 1110,650"/><path d="M 1250,350 L 1280,500 L 1260,700"/>
</g>
<!-- Ice face texture — subtle horizontal lines --
<g stroke="#6090b0" stroke-width="0.4" fill="none" opacity="0.15"
><path d="M 100,400 L 500,380"/><path d="M 600,350 L 1000,330"/><path d="M 1100,400 L 1300,390"/><path d="M 150,500 L 550,480"/><path d="M 700,450 L 1100,430"/><path d="M 1200,500 L 1350,490"/><path d="M 100,600 L 450,580"/><path d="M 650,550 L 1050,530"/><path d="M 1150,600 L 1300,590"/><path d="M 120,700 L 400,680"/><path d="M 700,650 L 1000,630"/><path d="M 1100,700 L 1250,690"/>
</g>
<!-- Ice glow — warm gold from hidden sun --
<ellipse cx="700" cy="400" rx="400" ry="200" fill="#c4a043" opacity="0.08" filter="url(#hb)"/><ellipse cx="600" cy="350" rx="200" ry="100" fill="#e8d080" opacity="0.06" filter="url(#hb)"/>
</g>
<!-- Water at base — dark, reflective --
>
<rect x="0" y="900" width="1400" height="500" fill="#060e18"/><path d="M 0,900 Q 200,880 400,890 Q 600,870 800,885 Q 1000,875 1200,890 Q 1350,880 1400,900" fill="#060e18"/>
<!-- Water reflections of ice --
>
<g stroke="#80b0d0" stroke-width="0.5" fill="none" opacity="0.15"
><path d="M 200,920 L 250,1050"/><path d="M 500,910 L 520,1040"/><path d="M 800,905 L 830,1030"/><path d="M 1100,915 L 1130,1040"/><path d="M 350,930 L 380,1060"/><path d="M 650,925 L 680,1050"/><path d="M 950,920 L 980,1050"/><path d="M 1250,930 L 1280,1060"/>
</g>
<!-- Water droplets falling --
>
<g stroke="#a0c8e0" stroke-width="1" fill="none" opacity="0.3"
><path d="M 250,350 L 245,450"/><path d="M 500,300 L 495,420"/><path d="M 750,250 L 745,380"/><path d="M 1000,320 L 995,440"/><path d="M 350,400 L 345,520"/><path d="M 600,350 L 595,480"/><path d="M 850,300 L 845,430"/><path d="M 1150,380 L 1145,500"/><path d="M 400,500 L 395,620"/><path d="M 700,450 L 695,580"/><path d="M 950,420 L 945,550"/><path d="M 1250,480 L 1245,600"/>
</g>
<!-- Tiny human silhouette for scale — bottom center --
>
<g fill="#030508"
><path d="M 690,1180 L 690,1130 Q 690,1115 700,1115 Q 710,1115 710,1130 L 710,1180"/><path d="M 700,1130 L 700,1100" stroke="#030508" stroke-width="8"/><path d="M 685,1120 L 715,1120" stroke="#030508" stroke-width="6"/>
</g>
<!-- Aurora hint above glacier --
>
<ellipse cx="700" cy="100" rx="500" ry="60" fill="#4a8faa" opacity="0.08" filter="url(#hb)" transform="rotate(-5,700,100)"/>
</svg></body></html>
