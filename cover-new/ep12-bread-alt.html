<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box;}</style></head><body>
<svg viewBox="0 0 1400 1400" width="1400" height="1400" xmlns="http://www.w3.org/2000/svg">
<defs>
<radialGradient id="bg" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#1a1208"/><stop offset="50%" stop-color="#0e0a06"/><stop offset="100%" stop-color="#050402"/></radialGradient>
<radialGradient id="ovenG" cx="50%" cy="30%" r="50%"><stop offset="0%" stop-color="#c4a043" stop-opacity="0.3"/><stop offset="40%" stop-color="#c4a043" stop-opacity="0.08"/><stop offset="100%" stop-color="#c4a043" stop-opacity="0"/></radialGradient>
<filter id="hb" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="45"/></filter>
<filter id="mb" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="12"/></filter>
<filter id="gl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="sg" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1400" height="1400" fill="url(#bg)"/>

<!-- Warm glow from oven -->
<circle cx="700" cy="600" r="350" fill="url(#ovenG)"/>

<!-- Steam rising -->
<g stroke="#fff" stroke-width="0.8" fill="none" opacity="0.12">
<path d="M 650,450 Q 640,400 650,350 Q 660,300 655,250"><animate attributeName="opacity" values="0.12;0.02;0.12" dur="4s" repeatCount="indefinite"/></path>
<path d="M 700,430 Q 710,380 700,330 Q 690,280 695,230"><animate attributeName="opacity" values="0.1;0.02;0.1" dur="5s" repeatCount="indefinite"/></path>
<path d="M 750,450 Q 760,400 750,350 Q 740,300 745,260"><animate attributeName="opacity" values="0.08;0.01;0.08" dur="4.5s" repeatCount="indefinite"/></path>
</g>

<!-- LOAF — large, warm, central -->
<g transform="translate(700, 700)">
<!-- Shadow -->
<ellipse cx="0" cy="80" rx="180" ry="30" fill="#000" opacity="0.2" filter="url(#mb)"/>
<!-- Main loaf shape -->
<path d="M -160,0 Q -170,-40 -150,-80 Q -120,-130 -60,-150 Q 0,-160 60,-150 Q 120,-130 150,-80 Q 170,-40 160,0 Q 150,30 100,50 Q 50,60 0,60 Q -50,60 -100,50 Q -150,30 -160,0 Z" fill="#c4a043" opacity="0.25" filter="url(#mb)"/>
<path d="M -160,0 Q -170,-40 -150,-80 Q -120,-130 -60,-150 Q 0,-160 60,-150 Q 120,-130 150,-80 Q 170,-40 160,0 Q 150,30 100,50 Q 50,60 0,60 Q -50,60 -100,50 Q -150,30 -160,0 Z" fill="none" stroke="#c4a043" stroke-width="2" opacity="0.7" filter="url(#gl)"/>
<!-- Score lines on top -->
<path d="M -80,-120 Q 0,-150 80,-120" stroke="#c4a043" stroke-width="1.2" fill="none" opacity="0.5"/>
<path d="M -100,-90 Q 0,-120 100,-90" stroke="#c4a043" stroke-width="0.8" fill="none" opacity="0.35"/>
<!-- Texture highlights -->
<path d="M -60,-100 Q 0,-115 60,-100" stroke="#e8d080" stroke-width="0.5" fill="none" opacity="0.3"/>
<!-- Warm glow from bread -->
<ellipse cx="0" cy="-40" rx="120" ry="60" fill="#e8d080" opacity="0.05" filter="url(#hb)"/>
</g>

<!-- Wheat stalks — flanking -->
<g stroke="#c4a043" fill="none" opacity="0.5" stroke-linecap="round">
<!-- Left wheat -->
<path d="M 250,1400 Q 240,1200 230,1000 Q 220,800 235,600" stroke-width="2"/>
<path d="M 280,1400 Q 270,1200 265,1000 Q 258,800 270,620" stroke-width="1.5"/>
<path d="M 220,1400 Q 210,1200 200,1000 Q 190,800 205,630" stroke-width="1.5"/>
<!-- Wheat heads -->
<ellipse cx="235" cy="580" rx="12" ry="30" transform="rotate(-5,235,580)" fill="#c4a043" opacity="0.3"/>
<ellipse cx="270" cy="600" rx="10" ry="25" transform="rotate(5,270,600)" fill="#c4a043" opacity="0.25"/>
<ellipse cx="205" cy="610" rx="10" ry="25" transform="rotate(-8,205,610)" fill="#c4a043" opacity="0.25"/>
<!-- Leaves -->
<path d="M 230,900 Q 200,870 180,850" stroke-width="1"/><path d="M 232,800 Q 260,770 280,750" stroke-width="0.8"/>

<!-- Right wheat -->
<path d="M 1150,1400 Q 1160,1200 1170,1000 Q 1180,800 1165,600" stroke-width="2"/>
<path d="M 1120,1400 Q 1130,1200 1135,1000 Q 1142,800 1130,620" stroke-width="1.5"/>
<path d="M 1180,1400 Q 1190,1200 1200,1000 Q 1210,800 1195,630" stroke-width="1.5"/>
<!-- Wheat heads -->
<ellipse cx="1165" cy="580" rx="12" ry="30" transform="rotate(5,1165,580)" fill="#c4a043" opacity="0.3"/>
<ellipse cx="1130" cy="600" rx="10" ry="25" transform="rotate(-5,1130,600)" fill="#c4a043" opacity="0.25"/>
<ellipse cx="1195" cy="610" rx="10" ry="25" transform="rotate(8,1195,610)" fill="#c4a043" opacity="0.25"/>
<!-- Leaves -->
<path d="M 1170,900 Q 1200,870 1220,850" stroke-width="1"/><path d="M 1168,800 Q 1140,770 1120,750" stroke-width="0.8"/>
</g>

<!-- Grain particles floating -->
<g fill="#c4a043" opacity="0.3" filter="url(#sg)">
<circle cx="400" cy="500" r="1.5"/><circle cx="500" cy="400" r="1"/><circle cx="600" cy="450" r="1.2"/><circle cx="800" cy="420" r="1.3"/><circle cx="900" cy="480" r="1"/><circle cx="1000" cy="400" r="1.5"/><circle cx="350" cy="350" r="0.8"/><circle cx="1050" cy="350" r="1.1"/>
</g>

<!-- Warm light particles -->
<g fill="#e8d080" opacity="0.3">
<circle cx="650" cy="500" r="1.2"><animate attributeName="cy" values="500;400;500" dur="5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.05;0.3" dur="5s" repeatCount="indefinite"/></circle>
<circle cx="700" cy="480" r="1"><animate attributeName="cy" values="480;370;480" dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.25;0.03;0.25" dur="6s" repeatCount="indefinite"/></circle>
<circle cx="750" cy="510" r="0.8"><animate attributeName="cy" values="510;410;510" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.03;0.2" dur="4s" repeatCount="indefinite"/></circle>
</g>

<!-- Table/surface line -->
<path d="M 100,780 Q 400,770 700,775 Q 1000,780 1300,770" stroke="#c4a043" stroke-width="0.6" fill="none" opacity="0.2"/>

<!-- Bottom -->
<rect x="0" y="1200" width="1400" height="200" fill="#050402" opacity="0.5"/>
<path d="M 0,1200 Q 200,1195 400,1200 Q 600,1205 800,1198 Q 1000,1192 1200,1200 Q 1350,1205 1400,1200" stroke="#c4a043" stroke-width="0.4" fill="none" opacity="0.1"/>
</svg></body></html>
