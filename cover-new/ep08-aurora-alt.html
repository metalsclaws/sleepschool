<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box;}</style></head><body>
<svg viewBox="0 0 1400 1400" width="1400" height="1400" xmlns="http://www.w3.org/2000/svg">
<defs>
<radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#0a1220"/><stop offset="50%" stop-color="#060c16"/><stop offset="100%" stop-color="#02050a"/></radialGradient>
<linearGradient id="aurora1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#20a060" stop-opacity="0"/><stop offset="30%" stop-color="#20a060" stop-opacity="0.3"/><stop offset="50%" stop-color="#40d080" stop-opacity="0.5"/><stop offset="70%" stop-color="#20a060" stop-opacity="0.3"/><stop offset="100%" stop-color="#20a060" stop-opacity="0"/></linearGradient>
<linearGradient id="aurora2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6040a0" stop-opacity="0"/><stop offset="30%" stop-color="#6040a0" stop-opacity="0.2"/><stop offset="50%" stop-color="#8060c0" stop-opacity="0.35"/><stop offset="70%" stop-color="#6040a0" stop-opacity="0.2"/><stop offset="100%" stop-color="#6040a0" stop-opacity="0"/></linearGradient>
<linearGradient id="aurora3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2090b0" stop-opacity="0"/><stop offset="25%" stop-color="#2090b0" stop-opacity="0.15"/><stop offset="50%" stop-color="#30b0d0" stop-opacity="0.25"/><stop offset="75%" stop-color="#2090b0" stop-opacity="0.15"/><stop offset="100%" stop-color="#2090b0" stop-opacity="0"/></linearGradient>
<filter id="hb" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="50"/></filter>
<filter id="mb" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="14"/></filter>
<filter id="gl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="sg" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1400" height="1400" fill="url(#bg)"/>

<!-- Dense star field -->
<g fill="#fff" opacity="0.45">
<circle cx="80" cy="40" r="0.8"/><circle cx="200" cy="90" r="1.2"/><circle cx="350" cy="50" r="0.7"/><circle cx="480" cy="110" r="1"/><circle cx="620" cy="60" r="0.9"/><circle cx="750" cy="100" r="1.1"/><circle cx="900" cy="45" r="0.8"/><circle cx="1050" cy="80" r="1.3"/><circle cx="1200" cy="55" r="0.7"/><circle cx="1350" cy="95" r="1"/>
<circle cx="150" cy="180" r="0.9"/><circle cx="320" cy="200" r="0.6"/><circle cx="470" cy="170" r="1.1"/><circle cx="630" cy="210" r="0.8"/><circle cx="780" cy="185" r="0.7"/><circle cx="950" cy="200" r="1"/><circle cx="1100" cy="175" r="0.9"/><circle cx="1280" cy="195" r="0.6"/>
<circle cx="100" cy="300" r="0.7"/><circle cx="280" cy="320" r="1"/><circle cx="430" cy="290" r="0.8"/><circle cx="580" cy="330" r="0.6"/><circle cx="720" cy="300" r="1.1"/><circle cx="880" cy="310" r="0.9"/><circle cx="1020" cy="280" r="0.7"/><circle cx="1180" cy="320" r="1"/>
</g>

<!-- AURORA BANDS — multiple overlapping curtains -->
<!-- Green main band -->
<path d="M 0,400 Q 100,280 200,350 Q 300,420 400,300 Q 500,200 600,320 Q 700,380 800,280 Q 900,200 1000,320 Q 1100,380 1200,280 Q 1300,200 1400,350" stroke="#20a060" stroke-width="80" fill="none" opacity="0.15" filter="url(#hb)"/>
<path d="M 0,400 Q 100,280 200,350 Q 300,420 400,300 Q 500,200 600,320 Q 700,380 800,280 Q 900,200 1000,320 Q 1100,380 1200,280 Q 1300,200 1400,350" stroke="#40d080" stroke-width="4" fill="none" opacity="0.6" filter="url(#gl)"/>

<!-- Purple secondary band -->
<path d="M 0,500 Q 150,350 300,420 Q 450,500 600,380 Q 750,280 900,400 Q 1050,480 1200,380 Q 1350,300 1400,400" stroke="#6040a0" stroke-width="60" fill="none" opacity="0.12" filter="url(#hb)"/>
<path d="M 0,500 Q 150,350 300,420 Q 450,500 600,380 Q 750,280 900,400 Q 1050,480 1200,380 Q 1350,300 1400,400" stroke="#8060c0" stroke-width="2.5" fill="none" opacity="0.45" filter="url(#gl)"/>

<!-- Teal tertiary band -->
<path d="M 0,350 Q 200,250 350,330 Q 500,400 700,280 Q 900,200 1100,330 Q 1250,400 1400,300" stroke="#2090b0" stroke-width="50" fill="none" opacity="0.08" filter="url(#hb)"/>
<path d="M 0,350 Q 200,250 350,330 Q 500,400 700,280 Q 900,200 1100,330 Q 1250,400 1400,300" stroke="#30b0d0" stroke-width="2" fill="none" opacity="0.35" filter="url(#gl)"/>

<!-- Vertical curtain rays -->
<g stroke="#40d080" stroke-width="0.8" fill="none" opacity="0.2" filter="url(#sg)">
<path d="M 300,200 Q 310,350 305,500"/><path d="M 500,180 Q 510,320 505,480"/><path d="M 700,160 Q 710,300 695,520"/>
<path d="M 900,180 Q 890,330 895,490"/><path d="M 1100,200 Q 1090,350 1095,500"/>
</g>
<g stroke="#8060c0" stroke-width="0.6" fill="none" opacity="0.15" filter="url(#sg)">
<path d="M 400,250 Q 405,380 400,530"/><path d="M 600,220 Q 605,350 595,500"/><path d="M 800,230 Q 795,360 800,510"/><path d="M 1000,250 Q 995,380 1000,520"/>
</g>

<!-- Mountain silhouettes — sharp peaks -->
<path d="M 0,1100 L 150,950 L 300,1050 L 450,900 L 600,1000 L 750,850 L 900,950 L 1050,800 L 1200,950 L 1350,850 L 1400,900 L 1400,1400 L 0,1400" fill="#060c12"/>
<!-- Snow line hints -->
<path d="M 450,900 L 470,920 L 430,930" stroke="#4a6fa5" stroke-width="0.5" fill="none" opacity="0.2"/>
<path d="M 1050,800 L 1070,820 L 1030,830" stroke="#4a6fa5" stroke-width="0.5" fill="none" opacity="0.2"/>
<path d="M 750,850 L 765,870 L 735,875" stroke="#4a6fa5" stroke-width="0.5" fill="none" opacity="0.2"/>

<!-- Lake reflection -->
<rect x="0" y="1100" width="1400" height="300" fill="#040810" opacity="0.6"/>
<g stroke="#20a060" stroke-width="0.4" fill="none" opacity="0.15">
<path d="M 100,1120 Q 250,1115 400,1120"/><path d="M 600,1130 Q 750,1125 900,1130"/><path d="M 200,1150 Q 400,1145 600,1150"/><path d="M 800,1145 Q 1000,1140 1200,1145"/><path d="M 400,1170 Q 600,1165 800,1170"/><path d="M 1000,1160 Q 1150,1155 1300,1160"/>
</g>

<!-- Reflection of aurora in lake -->
<path d="M 0,1120 Q 200,1110 400,1130 Q 600,1140 800,1120 Q 1000,1110 1200,1125 Q 1350,1140 1400,1120" stroke="#20a060" stroke-width="20" fill="none" opacity="0.05" filter="url(#hb)"/>

<!-- Bottom -->
<rect x="0" y="1250" width="1400" height="150" fill="#020508" opacity="0.6"/>
</svg></body></html>
