<!DOCTYPE html><html><head><meta charset="utf-8"><title>SleepSchool E12 - Walking with Dinosaurs</title><style>*{margin:0;padding:0}body{background:#03040d;display:flex;justify-content:center;align-items:center;min-height:100vh}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
<defs>
<filter id="hb"><feGaussianBlur stdDeviation="40"/></filter>
<filter id="mb"><feGaussianBlur stdDeviation="12"/></filter>
<filter id="gl"><feGaussianBlur stdDeviation="5"/></filter>
<filter id="sg"><feGaussianBlur stdDeviation="3"/></filter>
<linearGradient id="amberSky" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#1a1008"/><stop offset="40%" stop-color="#1a1408"/><stop offset="100%" stop-color="#0a0e1e"/>
</linearGradient>
<radialGradient id="volcanoGlow" cx="50%" cy="40%" r="50%">
<stop offset="0%" stop-color="#c4a043" stop-opacity="0.2"/><stop offset="100%" stop-color="#c4a043" stop-opacity="0"/>
</radialGradient>
</defs>
<rect width="1000" height="1000" fill="url(#amberSky)"/>
<!-- Stars (dim in amber sky) -->
<g fill="#fff" opacity="0.35"><circle cx="80" cy="40" r="1"/><circle cx="200" cy="60" r="1.2"/><circle cx="350" cy="30" r="0.9"/><circle cx="500" cy="55" r="1.1"/><circle cx="650" cy="35" r="1.3"/><circle cx="780" cy="50" r="1"/><circle cx="900" cy="25" r="1.2"/><circle cx="120" cy="90" r="0.8"/><circle cx="400" cy="80" r="1"/><circle cx="600" cy="70" r="0.9"/><circle cx="850" cy="85" r="1.1"/><circle cx="50" cy="120" r="0.7"/><circle cx="300" cy="110" r="1"/><circle cx="550" cy="100" r="0.8"/></g>
<!-- Amber glow from volcano -->
<ellipse cx="500" cy="300" rx="400" ry="300" fill="url(#volcanoGlow)"/>
<!-- THE BIG VOLCANO - centered, frame-filling -->
<g fill="#0a0e18">
<!-- Volcano body -->
<path d="M350,1000 L480,250 L500,200 L520,250 L650,1000Z"/>
<!-- Left slope extension -->
<path d="M350,1000 L380,800 L420,600 L460,400 L480,280 L490,220" fill="#0c1020"/>
<!-- Right slope extension -->
<path d="M650,1000 L620,800 L580,600 L540,400 L520,280 L510,220" fill="#0c1020"/>
<!-- Ridge details -->
<path d="M470,300 L480,250 L490,230" stroke="#080c16" stroke-width="2" fill="none"/>
<path d="M530,300 L520,250 L510,230" stroke="#080c16" stroke-width="2" fill="none"/>
</g>
<!-- Eruption - smoke plume -->
<g filter="url(#mb)">
<ellipse cx="500" cy="120" rx="120" ry="80" fill="#1a1815" opacity="0.6"/>
<ellipse cx="480" cy="80" rx="150" ry="60" fill="#1a1815" opacity="0.5"/>
<ellipse cx="520" cy="40" rx="180" ry="70" fill="#1a1815" opacity="0.4"/>
<ellipse cx="490" cy="0" rx="200" ry="60" fill="#1a1815" opacity="0.3"/>
<ellipse cx="460" cy="-40" rx="220" ry="50" fill="#1a1815" opacity="0.2"/>
</g>
<!-- Lava glow at crater -->
<g filter="url(#gl)">
<ellipse cx="500" cy="200" rx="30" ry="15" fill="#c4a043" opacity="0.6"/>
<ellipse cx="500" cy="195" rx="20" ry="10" fill="#d4b053" opacity="0.5"/>
</g>
<g filter="url(#sg)">
<ellipse cx="500" cy="200" rx="15" ry="8" fill="#e8c060" opacity="0.4"/>
</g>
<!-- Lava streams down volcano -->
<g filter="url(#gl)">
<path d="M490,220 Q485,300 478,400 Q472,500 468,600" stroke="#c4a043" stroke-width="4" fill="none" opacity="0.35"/>
<path d="M510,220 Q515,300 522,400 Q528,500 532,600" stroke="#c4a043" stroke-width="3" fill="none" opacity="0.3"/>
<path d="M495,220 Q490,280 485,350" stroke="#d4b053" stroke-width="2" fill="none" opacity="0.3"/>
<path d="M505,220 Q510,280 515,350" stroke="#d4b053" stroke-width="2" fill="none" opacity="0.25"/>
</g>
<!-- Eruption particles -->
<g fill="#c4a043" opacity="0.5">
<circle cx="480" cy="170" r="2"/><circle cx="520" cy="160" r="1.5"/><circle cx="495" cy="150" r="2.5"/>
<circle cx="510" cy="140" r="1.8"/><circle cx="485" cy="130" r="2"/><circle cx="515" cy="120" r="1.5"/>
<circle cx="490" cy="110" r="2.2"/><circle cx="505" cy="100" r="1.8"/>
</g>
<!-- SAUROPOD silhouette - left side, long neck -->
<g fill="#080c16">
<!-- Body -->
<ellipse cx="180" cy="850" rx="80" ry="40"/>
<!-- Neck -->
<path d="M200,830 Q210,780 215,720 Q218,680 225,640 Q228,620 230,600"/>
<!-- Head -->
<ellipse cx="232" cy="595" rx="18" ry="12"/>
<!-- Legs -->
<rect x="130" y="870" width="12" height="50" rx="4"/>
<rect x="160" y="870" width="12" height="50" rx="4"/>
<rect x="210" y="870" width="12" height="48" rx="4"/>
<rect x="235" y="870" width="12" height="48" rx="4"/>
<!-- Tail -->
<path d="M100,845 Q80,840 60,830 Q40,825 20,820 Q0,818 -20,815"/>
</g>
<!-- T-REX silhouette - right side -->
<g fill="#080c16">
<!-- Body -->
<ellipse cx="800" cy="830" rx="60" ry="45"/>
<!-- Head -->
<ellipse cx="880" cy="790" rx="30" ry="20"/>
<!-- Jaw -->
<path d="M900,795 L920,800 L900,800Z"/>
<!-- Neck -->
<path d="M850,810 Q860,800 870,795"/>
<!-- Tail -->
<path d="M740,835 Q720,830 690,825 Q660,820 630,815"/>
<!-- Legs - thick -->
<rect x="770" y="860" width="18" height="65" rx="6"/>
<rect x="800" y="865" width="16" height="60" rx="5"/>
<!-- Tiny arms -->
<path d="M860,810 Q870,820 865,830" stroke="#080c16" stroke-width="4" fill="none"/>
</g>
<!-- Ferns and ancient forest foreground -->
<g fill="#060a12" opacity="0.9">
<!-- Left fern cluster -->
<path d="M50,900 Q60,850 50,800 Q55,770 40,740 Q55,780 65,800 Q70,770 80,740 Q75,780 70,800 Q80,770 95,750 Q85,780 75,800 Q85,770 100,760 Q90,790 80,810"/>
<!-- Center ferns -->
<path d="M400,920 Q410,870 400,830 Q405,800 390,770 Q405,810 415,830 Q420,800 430,780 Q420,810 415,830"/>
<path d="M420,930 Q430,880 420,840 Q425,810 415,780 Q425,820 435,840"/>
<!-- Right fern cluster -->
<path d="M900,900 Q910,860 900,820 Q905,790 890,760 Q905,800 915,820 Q920,790 930,770 Q915,800 910,820 Q920,790 940,780 Q925,810 915,830"/>
</g>
<!-- Ground -->
<rect x="0" y="900" width="1000" height="100" fill="#060810"/>
<path d="M0,900 Q250,880 500,890 Q750,880 1000,900 L1000,920 Q500,910 0,920Z" fill="#050810" opacity="0.5"/>
</svg>
</body></html>
