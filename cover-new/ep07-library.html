<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>body{margin:0;padding:0;background:#060810;display:flex;align-items:center;justify-content:center;height:100vh;}</style></head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1400" width="1400" height="1400">
  <defs>
    <radialGradient id="bg7" cx="50%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#0c0e18"/>
      <stop offset="100%" stop-color="#060810"/>
    </radialGradient>
    <radialGradient id="flame7" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c0c8d4" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#8a9ab5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8a9ab5" stop-opacity="0"/>
    </radialGradient>
    <filter id="shelfglow7">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft7">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="flameglow7">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1400" height="1400" fill="url(#bg7)"/>

  <!-- Stars through the central arch -->
  <g opacity="0.3">
    <circle cx="660" cy="180" r="1" fill="#c0c8d4"/>
    <circle cx="740" cy="140" r="1.2" fill="#8a9ab5"/>
    <circle cx="690" cy="220" r="0.8" fill="#c0c8d4"/>
    <circle cx="720" cy="170" r="0.6" fill="#dde4ee"/>
    <circle cx="650" cy="250" r="0.7" fill="#8a9ab5"/>
    <circle cx="750" cy="210" r="1" fill="#c0c8d4"/>
    <circle cx="680" cy="150" r="0.5" fill="#dde4ee"/>
    <circle cx="710" cy="260" r="0.8" fill="#8a9ab5"/>
  </g>

  <!-- Central arch — the window into infinite void -->
  <path d="M 600,100 L 600,480 Q 600,540 660,560 L 660,560 Q 700,575 740,560 L 740,560 Q 800,540 800,480 L 800,100"
        fill="none" stroke="#8a9ab5" stroke-width="1.2" opacity="0.2"/>
  <!-- Arch keystone accent -->
  <path d="M 600,100 Q 700,60 800,100" fill="none" stroke="#8a9ab5" stroke-width="0.8" opacity="0.15"/>

  <!-- Left shelf tower -->
  <g filter="url(#shelfglow7)">
    <!-- Shelves receding into shadow -->
    <line x1="80" y1="300" x2="560" y2="340" stroke="#3a4458" stroke-width="1.5" opacity="0.5"/>
    <line x1="80" y1="420" x2="560" y2="460" stroke="#3a4458" stroke-width="1.5" opacity="0.45"/>
    <line x1="80" y1="540" x2="560" y2="580" stroke="#3a4458" stroke-width="1.5" opacity="0.4"/>
    <line x1="80" y1="660" x2="560" y2="700" stroke="#3a4458" stroke-width="1.5" opacity="0.35"/>
    <line x1="80" y1="780" x2="560" y2="810" stroke="#3a4458" stroke-width="1.5" opacity="0.3"/>
    <line x1="80" y1="900" x2="560" y2="930" stroke="#3a4458" stroke-width="1.5" opacity="0.25"/>
    <line x1="80" y1="1020" x2="560" y2="1050" stroke="#3a4458" stroke-width="1.5" opacity="0.2"/>
    <line x1="80" y1="1140" x2="560" y2="1160" stroke="#3a4458" stroke-width="1.5" opacity="0.15"/>
    <!-- Vertical supports -->
    <line x1="80" y1="280" x2="80" y2="1180" stroke="#3a4458" stroke-width="2" opacity="0.3"/>
    <line x1="560" y1="320" x2="560" y2="1170" stroke="#3a4458" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Right shelf tower -->
  <g filter="url(#shelfglow7)">
    <line x1="840" y1="340" x2="1320" y2="300" stroke="#3a4458" stroke-width="1.5" opacity="0.5"/>
    <line x1="840" y1="460" x2="1320" y2="420" stroke="#3a4458" stroke-width="1.5" opacity="0.45"/>
    <line x1="840" y1="580" x2="1320" y2="540" stroke="#3a4458" stroke-width="1.5" opacity="0.4"/>
    <line x1="840" y1="700" x2="1320" y2="660" stroke="#3a4458" stroke-width="1.5" opacity="0.35"/>
    <line x1="840" y1="810" x2="1320" y2="780" stroke="#3a4458" stroke-width="1.5" opacity="0.3"/>
    <line x1="840" y1="930" x2="1320" y2="900" stroke="#3a4458" stroke-width="1.5" opacity="0.25"/>
    <line x1="840" y1="1050" x2="1320" y2="1020" stroke="#3a4458" stroke-width="1.5" opacity="0.2"/>
    <line x1="840" y1="1160" x2="1320" y2="1140" stroke="#3a4458" stroke-width="1.5" opacity="0.15"/>
    <!-- Vertical supports -->
    <line x1="840" y1="320" x2="840" y2="1170" stroke="#3a4458" stroke-width="1" opacity="0.2"/>
    <line x1="1320" y1="280" x2="1320" y2="1180" stroke="#3a4458" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- A few book suggestions on shelves (tiny vertical lines) -->
  <g stroke="#4a5a70" stroke-width="1" opacity="0.15">
    <!-- Left shelves books -->
    <line x1="150" y1="300" x2="150" y2="322"/><line x1="170" y1="302" x2="170" y2="320"/>
    <line x1="200" y1="304" x2="200" y2="325"/><line x1="220" y1="305" x2="220" y2="323"/>
    <line x1="260" y1="307" x2="260" y2="330"/><line x1="290" y1="309" x2="290" y2="328"/>
    <!-- Lower shelf books -->
    <line x1="120" y1="540" x2="120" y2="558"/><line x1="140" y1="542" x2="140" y2="560"/>
    <line x1="180" y1="544" x2="180" y2="563"/><line x1="210" y1="546" x2="210" y2="562"/>
    <!-- Right shelves books -->
    <line x1="1180" y1="300" x2="1180" y2="322"/><line x1="1210" y1="298" x2="1210" y2="320"/>
    <line x1="1250" y1="296" x2="1250" y2="318"/><line x1="1280" y1="294" x2="1280" y2="316"/>
  </g>

  <!-- The single flame at bottom center -->
  <ellipse cx="700" cy="1250" rx="200" ry="80" fill="url(#flame7)" filter="url(#flameglow7)" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.4;0.3" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Flame body -->
  <g filter="url(#flameglow7)">
    <path d="M 700,1200 Q 688,1215 685,1235 Q 683,1255 700,1260 Q 717,1255 715,1235 Q 712,1215 700,1200 Z"
          fill="#8a9ab5" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.9;0.7" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 700,1210 Q 694,1220 692,1235 Q 690,1248 700,1252 Q 710,1248 708,1235 Q 706,1220 700,1210 Z"
          fill="#c0c8d4" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </path>
    <circle cx="700" cy="1240" r="4" fill="#dde4ee" opacity="0.9"/>
  </g>

  <!-- Flame light cone reaching up but barely illuminating -->
  <path d="M 680,1260 L 600,1100 L 800,1100 L 720,1260 Z" fill="#8a9ab5" opacity="0.02"/>

  <!-- Floor line -->
  <line x1="0" y1="1280" x2="1400" y2="1280" stroke="#2a3448" stroke-width="0.8" opacity="0.3"/>
</svg>
</body>
</html>
