<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box;}</style></head><body>
<svg viewBox="0 0 1400 1400" width="1400" height="1400" xmlns="http://www.w3.org/2000/svg">
<defs>
<radialGradient id="bg" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#0e1a10"/><stop offset="50%" stop-color="#080f0a"/><stop offset="100%" stop-color="#030502"/></radialGradient>
<filter id="hb" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="40"/></filter>
<filter id="mb" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="12"/></filter>
<filter id="gl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="sg" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1400" height="1400" fill="url(#bg)"/>
<!-- Sparse moonlight through canopy -->
<g fill="#c4a043" opacity="0.08"><circle cx="350" cy="100" r="80"/><circle cx="750" cy="80" r="100"/><circle cx="1100" cy="120" r="70"/>
</g>
<!-- BIG BAMBOO STALKS — frame filling, vertical dominance -->
<g>
<!-- Stalk 1 — left, massive -->
<path d="M 200,1400 L 210,800 L 215,400 L 220,0" stroke="#0e1a10" stroke-width="60" fill="none"/>
<path d="M 200,1400 L 210,800 L 215,400 L 220,0" stroke="#1a3018" stroke-width="50" fill="none" opacity="0.6"/>
<path d="M 205,1400 L 210,800 L 212,400 L 215,0" stroke="#c4a043" stroke-width="2" fill="none" opacity="0.35"/>
<!-- Stalk 2 — center-left, biggest -->
<path d="M 500,1400 L 505,850 L 508,450 L 510,0" stroke="#0e1a10" stroke-width="75" fill="none"/>
<path d="M 500,1400 L 505,850 L 508,450 L 510,0" stroke="#1a3018" stroke-width="62" fill="none" opacity="0.6"/>
<path d="M 503,1400 L 505,850 L 506,450 L 508,0" stroke="#c4a043" stroke-width="2.5" fill="none" opacity="0.4"/>
<path d="M 520,1400 L 515,850 L 512,450 L 510,0" stroke="#c4a043" stroke-width="1.5" fill="none" opacity="0.25"/>
<!-- Stalk 3 — center-right, big -->
<path d="M 850,1400 L 855,900 L 858,500 L 860,0" stroke="#0e1a10" stroke-width="65" fill="none"/>
<path d="M 850,1400 L 855,900 L 858,500 L 860,0" stroke="#1a3018" stroke-width="54" fill="none" opacity="0.6"/>
<path d="M 853,1400 L 855,900 L 856,500 L 858,0" stroke="#c4a043" stroke-width="2" fill="none" opacity="0.35"/>
<!-- Stalk 4 — right -->
<path d="M 1150,1400 L 1145,850 L 1142,450 L 1140,0" stroke="#0e1a10" stroke-width="55" fill="none"/>
<path d="M 1150,1400 L 1145,850 L 1142,450 L 1140,0" stroke="#1a3018" stroke-width="45" fill="none" opacity="0.6"/>
<path d="M 1147,1400 L 1145,850 L 1144,450 L 1142,0" stroke="#c4a043" stroke-width="1.5" fill="none" opacity="0.3"/>
<!-- Stalk 5 — far left, thinner -->
<path d="M 50,1400 L 55,900 L 58,500 L 60,0" stroke="#0e1a10" stroke-width="40" fill="none"/>
<path d="M 50,1400 L 55,900 L 58,500 L 60,0" stroke="#1a3018" stroke-width="32" fill="none" opacity="0.5"/>
<!-- Stalk 6 — far right, thinner -->
<path d="M 1320,1400 L 1315,900 L 1312,500 L 1310,0" stroke="#0e1a10" stroke-width="35" fill="none"/>
<path d="M 1320,1400 L 1315,900 L 1312,500 L 1310,0" stroke="#1a3018" stroke-width="28" fill="none" opacity="0.5"/>
<!-- NODES (joints) — horizontal rings, gold -->
<g stroke="#c4a043" stroke-width="2" fill="none" opacity="0.5">
<line x1="170" y1="1200" x2="230" y2="1200"/><line x1="175" y1="1000" x2="225" y2="1000"/><line x1="178" y1="800" x2="222" y2="800"/><line x1="180" y1="600" x2="220" y2="600"/><line x1="182" y1="400" x2="218" y2="400"/><line x1="185" y1="200" x2="215" y2="200"/>
<line x1="460" y1="1200" x2="540" y2="1200"/><line x1="465" y1="1000" x2="535" y2="1000"/><line x1="468" y1="800" x2="532" y2="800"/><line x1="470" y1="600" x2="530" y2="600"/><line x1="472" y1="400" x2="528" y2="400"/><line x1="475" y1="200" x2="525" y2="200"/>
<line x1="815" y1="1200" x2="885" y2="1200"/><line x1="820" y1="1000" x2="880" y2="1000"/><line x1="823" y1="800" x2="877" y2="800"/><line x1="825" y1="600" x2="875" y2="600"/><line x1="827" y1="400" x2="873" y2="400"/><line x1="830" y1="200" x2="870" y2="200"/>
<line x1="1115" y1="1200" x2="1185" y2="1200"/><line x1="1120" y1="1000" x2="1180" y2="1000"/><line x1="1123" y1="800" x2="1177" y2="800"/><line x1="1125" y1="600" x2="1175" y2="600"/><line x1="1127" y1="400" x2="1173" y2="400"/><line x1="1130" y1="200" x2="1170" y2="200"/>
</g>
<!-- Leaves — big, bold, arching from stalks -->
<g fill="#0e1a10" stroke="#1a3018" stroke-width="0.5">
<path d="M 220,1100 Q 300,1050 380,1080 Q 300,1100 220,1100 Z"/><path d="M 215,900 Q 290,850 360,880 Q 290,900 215,900 Z"/>
<path d="M 510,1150 Q 600,1100 680,1140 Q 600,1160 510,1150 Z"/><path d="M 508,950 Q 590,900 670,930 Q 590,960 508,950 Z"/><path d="M 505,750 Q 580,700 660,730 Q 580,760 505,750 Z"/>
<path d="M 860,1120 Q 940,1070 1020,1100 Q 940,1120 860,1120 Z"/><path d="M 858,920 Q 930,870 1010,900 Q 930,930 858,920 Z"/><path d="M 855,720 Q 920,670 1000,700 Q 920,730 855,720 Z"/>
</g>
<!-- Gold leaf highlights -->
<g fill="#c4a043" opacity="0.15">
<path d="M 220,1100 Q 300,1050 380,1080 Q 300,1100 220,1100 Z"/><path d="M 510,1150 Q 600,1100 680,1140 Q 600,1160 510,1150 Z"/><path d="M 860,1120 Q 940,1070 1020,1100 Q 940,1120 860,1120 Z"/>
</g>
<!-- Mist layers — soft, between stalks -->
<ellipse cx="350" cy="700" rx="200" ry="80" fill="#a0b0a0" opacity="0.06" filter="url(#hb)"/><ellipse cx="680" cy="500" rx="250" ry="100" fill="#a0b0a0" opacity="0.05" filter="url(#hb)"/><ellipse cx="950" cy="750" rx="180" ry="70" fill="#a0b0a0" opacity="0.06" filter="url(#hb)"/>
<ellipse cx="700" cy="300" rx="300" ry="120" fill="#90a090" opacity="0.04" filter="url(#hb)"/>
<!-- Fireflies / glow in mist -->
<g fill="#c4a043" filter="url(#sg)">
<circle cx="300" cy="650" r="2" opacity="0.5"></circle>
<circle cx="600" cy="450" r="2.5" opacity="0.6"></circle>
<circle cx="900" cy="700" r="1.8" opacity="0.45"></circle>
<circle cx="500" cy="250" r="2.2" opacity="0.55"></circle>
<circle cx="750" cy="550" r="1.5" opacity="0.4"></circle>
</g>
<!-- Ground / base shadow -->
<rect x="0" y="1350" width="1400" height="50" fill="#030502" opacity="0.8"/>
</g>
</svg></body></html>
