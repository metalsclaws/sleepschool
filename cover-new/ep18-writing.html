<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box;}</style></head><body>
<svg viewBox="0 0 1400 1400" width="1400" height="1400" xmlns="http://www.w3.org/2000/svg">
<defs>
<radialGradient id="bg" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#1a1208"/><stop offset="40%" stop-color="#0e0a06"/><stop offset="100%" stop-color="#03040d"/></radialGradient>
<radialGradient id="candle" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#c4a043" stop-opacity="0.6"/><stop offset="30%" stop-color="#a08030" stop-opacity="0.2"/><stop offset="100%" stop-color="#03040d" stop-opacity="0"/></radialGradient>
<filter id="hb" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="40"/></filter>
<filter id="mb" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="12"/></filter>
<filter id="gl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="sg" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1400" height="1400" fill="url(#bg)"/>
<!-- Ambient warmth — candlelit feel -->
<ellipse cx="700" cy="600" rx="500" ry="350" fill="#1a1408" opacity="0.25" filter="url(#hb)"/>
<ellipse cx="700" cy="500" rx="350" ry="250" fill="#201808" opacity="0.2" filter="url(#mb)"/>
<!-- CLAY TABLET — big, centered, tilted slightly -->
<g transform="translate(700,650) rotate(2)">
<!-- Tablet shadow -->
<rect x="-360" y="-240" width="720" height="480" rx="8" fill="#0a0604" opacity="0.4" transform="translate(15,15)" filter="url(#mb)"/>
<!-- Tablet body — dark terracotta -->
<rect x="-350" y="-250" width="700" height="500" rx="6" fill="#1e1008"/>
<!-- Tablet edge — rough clay -->
<rect x="-350" y="-250" width="700" height="500" rx="6" fill="none" stroke="#2a1810" stroke-width="3"/>
<!-- Warm highlight on top edge -->
<path d="M-346,-250 L346,-250" stroke="#c4a043" stroke-width="1.5" opacity="0.3"/>
<!-- CUNEIFORM MARKS — wedge-shaped impressions, rows -->
<g fill="#0a0504">
<!-- Row 1 -->
<polygon points="-280,-160 -270,-180 -260,-160"/><polygon points="-220,-165 -210,-185 -200,-165"/><polygon points="-160,-160 -150,-180 -140,-160"/>
<polygon points="-100,-165 -90,-185 -80,-165"/><polygon points="-40,-160 -30,-180 -20,-160"/><polygon points="20,-165 30,-185 40,-165"/>
<polygon points="80,-160 90,-180 100,-160"/><polygon points="140,-165 150,-185 160,-165"/><polygon points="200,-160 210,-180 220,-160"/>
<polygon points="260,-165 270,-185 280,-165"/>
<!-- Row 2 — different pattern -->
<polygon points="-260,-110 -250,-130 -240,-110"/><polygon points="-180,-115 -170,-135 -160,-115"/><polygon points="-100,-110 -90,-130 -80,-110"/>
<polygon points="-20,-115 -10,-135 0,-115"/><polygon points="60,-110 70,-130 80,-110"/><polygon points="140,-115 150,-135 160,-115"/>
<polygon points="220,-110 230,-130 240,-110"/><polygon points="280,-115 290,-135 300,-115"/>
<!-- Row 3 -->
<polygon points="-290,-60 -280,-80 -270,-60"/><polygon points="-210,-65 -200,-85 -190,-65"/><polygon points="-130,-60 -120,-80 -110,-60"/>
<polygon points="-50,-65 -40,-85 -30,-65"/><polygon points="30,-60 40,-80 50,-60"/><polygon points="110,-65 120,-85 130,-65"/>
<polygon points="190,-60 200,-80 210,-60"/><polygon points="270,-65 280,-85 290,-65"/>
<!-- Row 4 -->
<polygon points="-270,-10 -260,-30 -250,-10"/><polygon points="-190,-15 -180,-35 -170,-15"/><polygon points="-110,-10 -100,-30 -90,-10"/>
<polygon points="-30,-15 -20,-35 -10,-15"/><polygon points="50,-10 60,-30 70,-10"/><polygon points="130,-15 140,-35 150,-15"/>
<polygon points="210,-10 220,-30 230,-10"/><polygon points="290,-15 300,-35 310,-15"/>
<!-- Row 5 -->
<polygon points="-250,40 -240,20 -230,40"/><polygon points="-170,35 -160,15 -150,35"/><polygon points="-90,40 -80,20 -70,40"/>
<polygon points="-10,35 0,15 10,35"/><polygon points="70,40 80,20 90,40"/><polygon points="150,35 160,15 170,35"/>
<polygon points="230,40 240,20 250,40"/><polygon points="300,35 310,15 320,35"/>
<!-- Row 6 — smaller, bottom edge -->
<polygon points="-230,90 -225,75 -220,90"/><polygon points="-150,85 -145,70 -140,85"/><polygon points="-70,90 -65,75 -60,90"/>
<polygon points="10,85 15,70 20,85"/><polygon points="90,90 95,75 100,90"/><polygon points="170,85 175,70 180,85"/>
<polygon points="250,90 255,75 260,90"/>
</g>
<!-- Cuneiform gold catch-light (edges) -->
<g stroke="#c4a043" stroke-width="0.5" fill="none" opacity="0.15">
<path d="M-280,-170 L-270,-180 L-260,-170"/><path d="M-220,-175 L-210,-185 L-200,-175"/>
<path d="M-100,-175 L-90,-185 L-80,-175"/><path d="M20,-175 L30,-185 L40,-175"/>
<path d="M140,-175 L150,-185 L160,-175"/><path d="M260,-175 L270,-185 L280,-175"/>
</g>
<!-- Indentation shadows in cuneiform -->
<g stroke="#0a0604" stroke-width="0.8" fill="none" opacity="0.5">
<path d="M-270,-165 L-260,-155"/><path d="M-210,-170 L-200,-160"/><path d="M-90,-170 L-80,-160"/>
<path d="M30,-170 L40,-160"/><path d="M150,-170 L160,-160"/><path d="M270,-170 L280,-160"/>
</g>
<!-- Vertical dividing lines — ancient tablet layout -->
<line x1="-150" y1="-240" x2="-150" y2="240" stroke="#c4a043" stroke-width="0.8" opacity="0.1"/>
<line x1="150" y1="-240" x2="150" y2="240" stroke="#c4a043" stroke-width="0.8" opacity="0.1"/>
<!-- Horizontal rule lines -->
<g stroke="#c4a043" stroke-width="0.5" opacity="0.08">
<line x1="-340" y1="-190" x2="340" y2="-190"/><line x1="-340" y1="-140" x2="340" y2="-140"/>
<line x1="-340" y1="-90" x2="340" y2="-90"/><line x1="-340" y1="-40" x2="340" y2="-40"/>
<line x1="-340" y1="10" x2="340" y2="10"/><line x1="-340" y1="60" x2="340" y2="60"/>
<line x1="-340" y1="110" x2="340" y2="110"/><line x1="-340" y1="160" x2="340" y2="160"/>
<line x1="-340" y1="210" x2="340" y2="210"/>
</g>
</g>
<!-- QUILL PEN — right side, resting on tablet -->
<g transform="translate(1050,500) rotate(-25)">
<!-- Shaft — long tapered -->
<path d="M0,0 L20,400" stroke="#1a1008" stroke-width="16" fill="none" stroke-linecap="round"/>
<path d="M0,0 L20,400" stroke="#2a1810" stroke-width="14" fill="none" stroke-linecap="round"/>
<!-- Gold highlight on shaft -->
<path d="M0,0 L10,200" stroke="#c4a043" stroke-width="1.5" opacity="0.25" fill="none"/>
<!-- Nib — pointed -->
<polygon points="0,400 -6,430 20,430 26,400" fill="#0e0804"/>
<polygon points="0,400 -6,430 20,430 26,400" fill="none" stroke="#c4a043" stroke-width="0.8" opacity="0.2"/>
<!-- Feather top — large, sweeping -->
<g fill="#0e0804">
<path d="M0,0 Q-40,-30 -80,-20 Q-40,-15 0,0"/>
<path d="M0,0 Q-30,-50 -60,-70 Q-25,-45 0,0"/>
<path d="M0,0 Q-50,-60 -90,-80 Q-45,-50 0,0"/>
<path d="M0,0 Q-70,-50 -110,-60 Q-55,-35 0,0"/>
<path d="M0,0 Q-50,-20 -90,-10 Q-45,-8 0,0"/>
</g>
<!-- Feather barbs — gold edge -->
<g stroke="#c4a043" stroke-width="0.5" fill="none" opacity="0.12">
<path d="M0,0 Q-40,-30 -80,-20"/><path d="M0,0 Q-30,-50 -60,-70"/><path d="M0,0 Q-50,-60 -90,-80"/>
<path d="M0,0 Q-70,-50 -110,-60"/><path d="M0,0 Q-50,-20 -90,-10"/>
</g>
</g>
<!-- INK WELL — bottom left, small -->
<g transform="translate(250,850)">
<!-- Shadow -->
<ellipse cx="0" cy="20" rx="50" ry="15" fill="#0a0604" opacity="0.4" filter="url(#sg)"/>
<!-- Jar body -->
<path d="M-40,-40 L40,-40 Q55,0 45,30 Q35,50 0,50 Q-35,50 -45,30 Q-55,0 -40,-40Z" fill="#140a06"/>
<path d="M-40,-40 L40,-40 Q55,0 45,30 Q35,50 0,50 Q-35,50 -45,30 Q-55,0 -40,-40Z" fill="none" stroke="#2a1810" stroke-width="1.5"/>
<!-- Ink surface -->
<ellipse cx="0" cy="-40" rx="40" ry="8" fill="#030205"/>
<ellipse cx="0" cy="-40" rx="40" ry="8" fill="#1a0e08" opacity="0.3"/>
<!-- Gold rim -->
<ellipse cx="0" cy="-40" rx="40" ry="8" fill="none" stroke="#c4a043" stroke-width="1" opacity="0.25"/>
<!-- Warm glow from candle on jar -->
<ellipse cx="0" cy="0" rx="30" ry="35" fill="#c4a043" opacity="0.04"/>
</g>
<!-- CANDLE — bottom right, warm amber light -->
<g transform="translate(1150,950)">
<!-- Candle glow -->
<ellipse cx="0" cy="-80" rx="150" ry="120" fill="url(#candle)" filter="url(#mb)"/>
<!-- Candle body — tall cylinder -->
<rect x="-25" y="-80" width="50" height="120" rx="3" fill="#1a1408"/>
<rect x="-25" y="-80" width="50" height="120" rx="3" fill="none" stroke="#2a2010" stroke-width="1"/>
<!-- Warm side highlight -->
<rect x="-25" y="-80" width="50" height="120" rx="3" fill="#c4a043" opacity="0.06"/>
<!-- Candle flame — warm, flickering shape -->
<ellipse cx="0" cy="-90" rx="8" ry="20" fill="#c4a043"/>
<ellipse cx="0" cy="-90" rx="5" ry="14" fill="#ffe0a0"/>
<ellipse cx="0" cy="-88" rx="3" ry="8" fill="#fff"/>
<!-- Flame glow core -->
<circle cx="0" cy="-85" r="15" fill="#c4a043" opacity="0.15" filter="url(#sg)"/>
<!-- Wax drip -->
<path d="M-22,-40 Q-18,-50 -18,-60" stroke="#c4a043" stroke-width="1.5" opacity="0.3" fill="none"/>
<path d="M20,-30 Q24,-40 24,-50" stroke="#c4a043" stroke-width="1.2" opacity="0.25" fill="none"/>
</g>
<!-- Scattered parchment fragments in background -->
<g fill="#0e0a04" opacity="0.15">
<rect x="150" y="200" width="120" height="80" rx="2" transform="rotate(15 210 240)"/>
<rect x="1100" y="250" width="100" height="70" rx="2" transform="rotate(-10 1150 285)"/>
<rect x="200" y="1000" width="80" height="60" rx="2" transform="rotate(-8 240 1030)"/>
</g>
<!-- Faint text lines on background parchment -->
<g stroke="#c4a043" stroke-width="0.5" opacity="0.06">
<line x1="160" y1="220" x2="260" y2="220"/><line x1="165" y1="230" x2="265" y2="230"/><line x1="170" y1="240" x2="270" y2="240"/>
<line x1="1110" y1="270" x2="1190" y2="270"/><line x1="1115" y1="280" x2="1195" y2="280"/><line x1="1120" y1="290" x2="1200" y2="290"/>
</g>
<!-- Vignette edges -->
<rect width="1400" height="1400" fill="#03040d" opacity="0.1"/>
</svg></body></html>
