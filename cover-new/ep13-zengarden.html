<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box;}</style></head><body>
<svg viewBox="0 0 1400 1400" width="1400" height="1400" xmlns="http://www.w3.org/2000/svg">
<defs>
<radialGradient id="bg" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#0e1418"/><stop offset="50%" stop-color="#080c10"/><stop offset="100%" stop-color="#030508"/></radialGradient>
<filter id="hb" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="40"/></filter>
<filter id="mb" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="12"/></filter>
<filter id="gl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="sg" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1400" height="1400" fill="url(#bg)"/>
<!-- Sparse stars -->
<g fill="#fff" opacity="0.3"><circle cx="200" cy="60" r="0.7"/><circle cx="450" cy="40" r="0.9"/><circle cx="700" cy="80" r="0.6"/><circle cx="950" cy="50" r="1"/><circle cx="1200" cy="90" r="0.8"/><circle cx="100" cy="180" r="0.8"/><circle cx="350" cy="160" r="1"/><circle cx="600" cy="200" r="0.7"/><circle cx="850" cy="170" r="0.9"/><circle cx="1100" cy="190" r="0.8"/><circle cx="1300" cy="220" r="0.7"/>
</g>
<!-- ZEN GARDEN — big, centered, fills lower half -->
<g transform="translate(700, 900)">
<!-- Sand base — warm dark -->
<rect x="-500" y="-200" width="1000" height="400" fill="#12100c" rx="20"/>
<!-- Outer border — subtle stone edge -->
<rect x="-500" y="-200" width="1000" height="400" fill="none" stroke="#c4a043" stroke-width="2" opacity="0.3" rx="20"/>
<!-- Raked sand circles — the signature pattern, BIG -->
<g stroke="#c4a043" stroke-width="1" fill="none" opacity="0.25"
><circle cx="0" cy="0" r="280"/><circle cx="0" cy="0" r="240"/><circle cx="0" cy="0" r="200"/><circle cx="0" cy="0" r="160"/><circle cx="0" cy="0" r="120"/><circle cx="0" cy="0" r="80"/><circle cx="0" cy="0" r="40"/>
</g>
<!-- Radial rake lines -->
<g stroke="#c4a043" stroke-width="0.4" fill="none" opacity="0.15"><line x1="0" y1="-280" x2="0" y2="280"/><line x1="-280" y1="0" x2="280" y2="0"/><line x1="-198" y1="-198" x2="198" y2="198"/><line x1="198" y1="-198" x2="-198" y2="198"/><line x1="-140" y1="-242" x2="140" y2="242"/><line x1="140" y1="-242" x2="-140" y2="242"/><line x1="-242" y1="-140" x2="242" y2="140"/><line x1="242" y1="-140" x2="-242" y2="140"/>
</g>
<!-- BIG STONE — left, prominent -->
<g><ellipse cx="-180" cy="-60" rx="90" ry="55" fill="#1a1814"/><ellipse cx="-180" cy="-60" rx="90" ry="55" fill="none" stroke="#c4a043" stroke-width="1" opacity="0.3"/><ellipse cx="-180" cy="-65" rx="80" ry="45" fill="#1e1c18"/><ellipse cx="-180" cy="-65" rx="80" ry="45" fill="none" stroke="#c4a043" stroke-width="0.5" opacity="0.2"/>
</g>
<!-- SMALL STONE — right -->
<g><ellipse cx="140" cy="30" rx="55" ry="35" fill="#1a1814"/><ellipse cx="140" cy="30" rx="55" ry="35" fill="none" stroke="#c4a043" stroke-width="1" opacity="0.25"/><ellipse cx="140" cy="27" rx="48" ry="28" fill="#1e1c18"/>
</g>
<!-- TINY STONE — far right -->
<g><ellipse cx="220" cy="80" rx="30" ry="20" fill="#1a1814"/><ellipse cx="220" cy="80" rx="30" ry="20" fill="none" stroke="#c4a043" stroke-width="0.6" opacity="0.2"/>
</g>
<!-- Moss on stones -->
<g fill="#2a3520" opacity="0.15"
><ellipse cx="-200" cy="-80" rx="30" ry="12"/><ellipse cx="130" cy="15" rx="15" ry="6"/>
</g>
<!-- Stone shadows in sand -->
<g fill="#0a0806" opacity="0.3"
><ellipse cx="-170" cy="10" rx="100" ry="20"/><ellipse cx="150" cy="80" rx="60" ry="12"/>
</g>
</g>
<!-- Bamboo in background — tall verticals, framing -->
<g stroke="#0e1a10" stroke-width="18" fill="none"
><path d="M 150,1400 L 155,800 L 158,300 L 160,0"/><path d="M 1250,1400 L 1245,900 L 1242,400 L 1240,0"/>
</g>
<g stroke="#1a3018" stroke-width="14" fill="none" opacity="0.5"
><path d="M 150,1400 L 155,800 L 158,300 L 160,0"/><path d="M 1250,1400 L 1245,900 L 1242,400 L 1240,0"/>
</g>
<g stroke="#c4a043" stroke-width="1.5" fill="none" opacity="0.25"
><path d="M 152,1400 L 155,800 L 157,300 L 158,0"/><path d="M 1248,1400 L 1245,900 L 1243,400 L 1242,0"/>
</g>
<!-- Nodes on bamboo -->
<g stroke="#c4a043" stroke-width="1.5" fill="none" opacity="0.35"
><line x1="130" y1="1200" x2="170" y2="1200"/><line x1="132" y1="1000" x2="168" y2="1000"/><line x1="134" y1="800" x2="166" y2="800"/><line x1="136" y1="600" x2="164" y2="600"/><line x1="138" y1="400" x2="162" y2="400"/><line x1="140" y1="200" x2="160" y2="200"/>
<line x1="1230" y1="1100" x2="1270" y2="1100"/><line x1="1232" y1="900" x2="1268" y2="900"/><line x1="1234" y1="700" x2="1266" y2="700"/><line x1="1236" y1="500" x2="1264" y2="500"/><line x1="1238" y1="300" x2="1262" y2="300"/><line x1="1240" y1="100" x2="1260" y2="100"/>
</g>
<!-- Bamboo leaves — arching into frame -->
<g fill="#0e1a10" stroke="#1a3018" stroke-width="0.5"
><path d="M 160,600 Q 240,550 320,580 Q 240,600 160,600 Z"/><path d="M 160,400 Q 230,350 300,380 Q 230,400 160,400 Z"/><path d="M 160,200 Q 210,160 270,180 Q 210,200 160,200 Z"/>
<path d="M 1240,500 Q 1160,450 1080,480 Q 1160,500 1240,500 Z"/><path d="M 1240,300 Q 1170,250 1090,280 Q 1170,300 1240,300 Z"/><path d="M 1240,100 Q 1190,60 1130,80 Q 1190,100 1240,100 Z"/>
</g>
<!-- Gold leaf highlights -->
<g fill="#c4a043" opacity="0.1"
><path d="M 160,600 Q 240,550 320,580 Q 240,600 160,600 Z"/><path d="M 1240,500 Q 1160,450 1080,480 Q 1160,500 1240,500 Z"/>
</g>
<!-- Mist above garden -->
<ellipse cx="700" cy="550" rx="350" ry="80" fill="#a0b0a0" opacity="0.04" filter="url(#hb)"/><ellipse cx="700" cy="600" rx="280" ry="60" fill="#90a090" opacity="0.03" filter="url(#hb)"/>
<!-- Subtle fireflies -->
<g fill="#c4a043" filter="url(#sg)"><circle cx="500" cy="700" r="1.5" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite"/></circle><circle cx="900" cy="750" r="2" opacity="0.5"><animate attributeName="opacity" values="0.5;0.05;0.5" dur="5s" repeatCount="indefinite"/></circle><circle cx="700" cy="500" r="1.8" opacity="0.35"><animate attributeName="opacity" values="0.35;0.1;0.35" dur="6s" repeatCount="indefinite"/></circle>
</g>
</svg></body></html>
