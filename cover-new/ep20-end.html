<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box;}</style></head><body>
<svg viewBox="0 0 1400 1400" width="1400" height="1400" xmlns="http://www.w3.org/2000/svg">
<defs><radialGradient id="bg" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#0a050e"/><stop offset="50%" stop-color="#050208"/><stop offset="100%" stop-color="#020103"/></radialGradient>
<radialGradient id="hole" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#000000"/><stop offset="30%" stop-color="#020103"/><stop offset="60%" stop-color="#0a050e"/><stop offset="100%" stop-color="#1a0a1e"/></radialGradient>
<filter id="hb" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="60"/></filter>
<filter id="mb" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="18"/></filter>
<filter id="gl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="sg" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1400" height="1400" fill="url(#bg)"/>
<!-- Distant dying stars — sparse, red/amber --
>
<g fill="#c46040" opacity="0.3"><circle cx="150" cy="80" r="1.5"/><circle cx="400" cy="60" r="2"/><circle cx="650" cy="90" r="1.3"/><circle cx="900" cy="70" r="1.8"/><circle cx="1150" cy="100" r="1.5"/><circle cx="1300" cy="50" r="1.2"/><circle cx="250" cy="200" r="1.8"/><circle cx="500" cy="180" r="1.3"/><circle cx="800" cy="220" r="1.5"/><circle cx="1050" cy="190" r="2"/><circle cx="1250" cy="240" r="1.5"/></g>
<g fill="#c48040" opacity="0.2"
><circle cx="100" cy="300" r="1.2"/><circle cx="350" cy="280" r="1.5"/><circle cx="600" cy="320" r="1"/><circle cx="850" cy="290" r="1.3"/><circle cx="1100" cy="330" r="1.8"/><circle cx="1350" cy="310" r="1.2"/><circle cx="200" cy="450" r="1.5"/><circle cx="500" cy="420" r="1.8"/><circle cx="750" cy="460" r="1.3"/><circle cx="1000" cy="430" r="2"/><circle cx="1300" cy="480" r="1.5"/></g>
<!-- Stars being pulled in — motion lines toward center --
>
<g stroke="#c46040" stroke-width="0.5" fill="none" opacity="0.15"
><path d="M 150,150 L 650,650"/><path d="M 350,100 L 650,600"/><path d="M 900,120 L 700,580"/><path d="M 1200,180 L 750,620"/><path d="M 200,400 L 600,640"/><path d="M 500,300 L 630,620"/><path d="M 800,350 L 680,610"/><path d="M 1100,400 L 720,640"/><path d="M 1300,350 L 740,600"/>
</g>
<!-- BLACK HOLE — massive, dead center --
>
<circle cx="700" cy="650" r="250" fill="url(#hole)"/><circle cx="700" cy="650" r="150" fill="#000000"/><circle cx="700" cy="650" r="80" fill="#000000"/><circle cx="700" cy="650" r="40" fill="#000000"/>
<!-- Event horizon ring — thin bright line --
>
<circle cx="700" cy="650" r="245" stroke="#c46040" stroke-width="2" fill="none" opacity="0.6"/><circle cx="700" cy="650" r="248" stroke="#e08830" stroke-width="0.8" fill="none" opacity="0.4"/>
<!-- Accretion disk — spiral, dramatic --
>
<g stroke="#c46040" fill="none" opacity="0.3"
><ellipse cx="700" cy="650" rx="350" ry="90" transform="rotate(-15,700,650)" stroke-width="2"/><ellipse cx="700" cy="650" rx="400" ry="110" transform="rotate(-15,700,650)" stroke-width="1" opacity="0.2"/><ellipse cx="700" cy="650" rx="300" ry="70" transform="rotate(-15,700,650)" stroke-width="1.5" opacity="0.25"/>
</g>
<!-- Spiral arms of matter being consumed --
>
<g stroke="#c46040" stroke-width="1" fill="none" opacity="0.2"
><path d="M 1050,500 Q 950,600 850,650 Q 750,700 700,750"/><path d="M 450,800 Q 550,700 650,650 Q 750,600 700,550"/><path d="M 900,900 Q 800,800 750,700 Q 700,650 720,600"/><path d="M 500,450 Q 600,550 650,650 Q 700,750 680,800"/>
</g>
<!-- Hot matter around event horizon --
>
<g filter="url(#sg)"
><circle cx="950" cy="550" r="3" fill="#e08830" opacity="0.7"/><circle cx="850" cy="750" r="2.5" fill="#c46040" opacity="0.6"/><circle cx="500" cy="600" r="3" fill="#e08830" opacity="0.7"/><circle cx="600" cy="850" r="2.5" fill="#c46040" opacity="0.6"/><circle cx="1100" cy="650" r="2" fill="#e08830" opacity="0.5"/><circle cx="450" cy="500" r="2" fill="#c46040" opacity="0.5"/><circle cx="800" cy="450" r="2.5" fill="#e08830" opacity="0.6"/><circle cx="550" cy="750" r="2" fill="#c46040" opacity="0.5"/>
</g>
<!-- Distant galaxies being stretched --
>
<ellipse cx="300" cy="300" rx="80" ry="40" fill="#603050" opacity="0.1" filter="url(#hb)" transform="rotate(30,300,300)"/><ellipse cx="1100" cy="250" rx="60" ry="30" fill="#604030" opacity="0.08" filter="url(#hb)" transform="rotate(-20,1100,250)"/><ellipse cx="200" cy="900" rx="50" ry="25" fill="#603040" opacity="0.07" filter="url(#hb)" transform="rotate(45,200,900)"/>
<!-- Cosmic void texture --
>
<g fill="#1a0a1e" opacity="0.15"
><circle cx="700" cy="650" r="400" filter="url(#hb)"/><circle cx="700" cy="650" r="500" filter="url(#mb)" opacity="0.1"/>
</g>
<!-- Last stars in the void — tiny white points --
>
<g fill="#fff" opacity="0.1"
><circle cx="500" cy="500" r="0.8"/><circle cx="850" cy="450" r="0.6"/><circle cx="600" cy="800" r="0.9"/><circle cx="950" cy="850" r="0.7"/><circle cx="400" cy="700" r="0.8"/><circle cx="1000" cy="600" r="0.6"/><circle cx="750" cy="950" r="0.9"/><circle cx="300" cy="650" r="0.7"/><circle cx="1100" cy="750" r="0.8"/><circle cx="650" cy="400" r="0.6"/></g>
<!-- Darkness creeping from edges --
>
<rect x="0" y="0" width="1400" height="200" fill="#010102" opacity="0.5"/><rect x="0" y="1200" width="1400" height="200" fill="#010102" opacity="0.5"/><rect x="0" y="0" width="200" height="1400" fill="#010102" opacity="0.5"/><rect x="1200" y="0" width="200" height="1400" fill="#010102" opacity="0.5"/>
</svg></body></html>
